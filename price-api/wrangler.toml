name = "price-api"
main = "src/index.ts"
compatibility_date = "2026-02-18"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

[[d1_databases]]
binding = "PRICE_DB"
database_name = "price-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"
