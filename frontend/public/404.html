<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A KI PRI SA YÉ — Redirection en cours</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect — cible canonique : https://teetee971.github.io/akiprisaye-web/
      // Redirige les liens profonds vers le shell SPA en encodant le chemin dans ?p=
      var l = window.location;
      var origin = 'https://teetee971.github.io/akiprisaye-web';
      var subPath = l.pathname.replace(/^\/akiprisaye-web\//, '');
      l.replace(
        origin + '/?p=/' +
        subPath.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours vers l'application...</p>
  </body>
</html>
