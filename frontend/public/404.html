<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A KI PRI SA YÉ — Redirection en cours</title>
    <script type="text/javascript">
      // Redirection SPA vers GitHub Pages : https://teetee971.github.io/akiprisaye-web/
      var l = window.location;
      var path = l.pathname.slice(1).split('/').slice(1).join('/');
      l.replace(
        'https://teetee971.github.io/akiprisaye-web/?p=/' +
        path.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours vers l'application...</p>
  </body>
</html>
