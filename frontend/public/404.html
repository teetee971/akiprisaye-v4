<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A KI PRI SA YÉ — Redirection en cours</title>
    <script type="text/javascript">
      // Redirection SPA : redirige vers la racine du site courant
      var l = window.location;
      var path = l.pathname.split('/').slice(1).join('/');
      l.replace(
        l.protocol + '//' + l.host + '/?p=/' +
        path.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours vers l'application...</p>
  </body>
</html>
