<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter un ticket – A KI PRI SA YÉ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f7f7;
  padding: 16px;
  margin: 0;
}
.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 18px;
  max-width: 480px;
  margin: auto;
  box-shadow: 0 2px 10px rgba(0,0,0,.06);
}
h1 {
  font-size: 1.2rem;
  margin-bottom: 12px;
}
label {
  display: block;
  font-weight: 600;
  margin-top: 12px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 4px;
  font-size: 1rem;
}
button {
  margin-top: 18px;
  width: 100%;
  padding: 14px;
  font-size: 1rem;
  font-weight: 700;
}
.note {
  margin-top: 12px;
  font-size: .85rem;
  color: #555;
}
</style>
</head>

<body>

<div class="card">
  <h1>Ajouter un ticket ou une facture</h1>

  <label for="store">Magasin</label>
  <input id="store" placeholder="Ex : Carrefour Abymes">

  <label for="date">Date d’achat</label>
  <input id="date" type="date">

  <label for="territory">Territoire</label>
  <select id="territory">
    <option value="GP">Guadeloupe</option>
    <option value="MQ">Martinique</option>
    <option value="GF">Guyane</option>
    <option value="RE">La Réunion</option>
  </select>

  <label for="file">Photo du ticket</label>
  <input id="file" type="file" accept="image/*" capture="environment">

  <button onclick="send()">Envoyer le ticket</button>

  <p class="note">
    Aucune donnée personnelle collectée.  
    Les tickets servent uniquement à renforcer la fiabilité des prix.
  </p>
</div>

<script>
async function send() {
  const file = document.getElementById('file').files[0];
  if (!file) {
    alert('Merci de joindre une photo du ticket.');
    return;
  }

  const form = new FormData();
  form.append('file', file);
  form.append('store', document.getElementById('store').value);
  form.append('date', document.getElementById('date').value);
  form.append('territory', document.getElementById('territory').value);

  try {
    const res = await fetch('/api/upload-ticket', {
      method: 'POST',
      body: form
    });

    if (!res.ok) throw new Error();
    alert('Ticket envoyé avec succès ✔');
  } catch {
    alert('Erreur lors de l’envoi');
  }
}
</script>

</body>
</html>
