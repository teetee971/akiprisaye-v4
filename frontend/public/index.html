<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A KI PRI SA YÉ – Panier anti-crise</title>
  <meta name="description" content="Comparateur citoyen contre la vie chère"/>
  <style>
    body { font-family: system-ui; background:#f7f7f7; margin:0; padding:16px }
    .card { background:white; border-radius:12px; padding:16px; max-width:700px; margin:auto }
    .store { margin:10px 0; padding:10px; border-radius:8px; background:#eee }
    .best { background:#e6f7e6; font-weight:bold; border-left:4px solid #2e7d32 }
    h1 { text-align:center }
  </style>
</head>

<body>
  <div class="card">
    <h1>Panier anti-crise</h1>
    <div id="content">Chargement des données…</div>
  </div>

<script>
fetch("/data/mega-panier-anti-crise.json")
  .then(r => r.json())
  .then(data => {
    const basket = data.baskets?.[0];
    const stores = data.stores || [];
    if (!basket) throw "Aucun panier";

    let html = "";
    const min = Math.min(...stores.map(s => s.total || Infinity));

    stores.forEach(s => {
      html += `
        <div class="store ${s.total === min ? "best" : ""}">
          ${s.storeName} — ${s.total?.toFixed(2)} €
        </div>`;
    });

    document.getElementById("content").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("content").innerHTML =
      "<b>Erreur de chargement des données</b>";
    console.error(err);
  });
</script>
</body>
</html>
