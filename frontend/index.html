<!DOCTYPE html>
<html lang="fr" xml:lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-akiprisaye.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data: https:; frame-src 'self' https://a-ki-pri-sa-ye.firebaseapp.com https://*.firebaseapp.com https://*.googleapis.com; base-uri 'self'; form-action 'self';"
    />
    <title>A Ki Pri Sa Yé - Comparer les prix en Guadeloupe</title>
    <meta name="description" content="Comparez les prix des supermarchés en Guadeloupe et économisez sur vos courses." />
    <!-- Preconnect to Firebase origins actually used by the app -->
    <link rel="preconnect" href="https://a-ki-pri-sa-ye.firebaseapp.com" crossorigin />
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://static.cloudflareinsights.com" crossorigin />
  </head>
  <body>
    <script>
      // GitHub Pages deep-link restore: /?p=/route -> /route
      (function () {
        var search = window.location.search;
        if (!search) return;
        if (search[1] === 'p') {
          var path = decodeURIComponent(search.slice(3).split('&')[0] || '/');
          var url = window.location.origin + window.location.pathname.replace(/\/$/, '') + path;
          window.history.replaceState(null, '', url);
        }
      })();
    </script>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
