    <!-- ═══════════════════════════════════════════════════════════════
         GitHub Pages SPA path-restore
         404.html redirects /akiprisaye-web/some/path → /akiprisaye-web/?p=%2Fsome%2Fpath
         This script restores the URL before React Router boots.
    ═══════════════════════════════════════════════════════════════ -->
    <script>
      (function () {
        var search = window.location.search;
        if (search.length > 1 && search[1] === 'p') {
          var path = decodeURIComponent(search.slice(3).split('&')[0]);
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, '') + path + window.location.hash
          );
        }
      })();
    </script>
