<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A&nbsp;KI PRI SA YÉ — Gérez votre budget</title>
  <meta name="description" content="Comparez les prix, gérez votre budget facilement et luttez contre la vie chère." />
  <!-- Manifest et icônes pour mode PWA -->
  <link rel="manifest" href="manifest.json" />
  <!-- Icônes multiples pour différentes résolutions et plateformes -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon_192.png" />
  <link rel="icon" type="image/png" sizes="256x256" href="assets/icon_256.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon_512.png" />
  <link rel="apple-touch-icon" href="assets/icon_192.png" />
  <meta name="theme-color" content="#000000" />
  <style>
    /* Réinitialisation et styles de base */
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      color: #ffffff;
      background-color: #0b0d17;
      overflow-x: hidden;
    }

    /* Conteneur du carrousel plein écran */
    .carousel {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* Chaque diapositive occupe tout l'espace disponible et se fond avec opacité */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: slideShow 15s infinite;
    }

    /* Définition des dégradés de fond pour chaque diapositive */
    .slide:nth-child(1) {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation-delay: 0s;
    }
    .slide:nth-child(2) {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation-delay: 5s;
    }
    .slide:nth-child(3) {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      animation-delay: 10s;
    }

    /* Animation de fondu enchaîné pour les diapositives */
    @keyframes slideShow {
      0% {
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      30% {
        opacity: 1;
      }
      35% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    /* Couche de texte par‑dessus le carrousel */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.8rem;
      margin: 0 0 1rem 0;
      letter-spacing: 0.05rem;
      max-width: 90%;
      word-wrap: break-word;
    }

    p.slogan {
      font-size: 1.5rem;
      margin: 0.5rem 0;
      max-width: 90%;
    }

    .btn {
      margin-top: 2rem;
      display: inline-block;
      background-color: #0f62fe;
      color: #ffffff;
      padding: 0.8rem 1.8rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #0353e9;
    }

    /* Ajustements responsifs pour petits écrans */
    /* Écrans très petits (smartphones en mode portrait) */
    @media (max-width: 360px) {
      .overlay {
        padding: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem 0;
      }
      p.slogan {
        font-size: 0.9rem;
        margin: 0.3rem 0;
      }
      .btn {
        padding: 0.7rem 1.2rem;
        font-size: 0.9rem;
        margin-top: 1.5rem;
      }
    }

    /* Smartphones */
    @media (min-width: 361px) and (max-width: 480px) {
      .overlay {
        padding: 1.25rem;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.85rem 0;
      }
      p.slogan {
        font-size: 1rem;
        margin: 0.4rem 0;
      }
      .btn {
        padding: 0.75rem 1.4rem;
        font-size: 0.95rem;
        margin-top: 1.75rem;
      }
    }

    /* Smartphones plus grands et petites tablettes en mode portrait */
    @media (min-width: 481px) and (max-width: 768px) {
      .overlay {
        padding: 1.5rem;
      }
      h1 {
        font-size: 2rem;
        margin: 0 0 1rem 0;
      }
      p.slogan {
        font-size: 1.1rem;
        margin: 0.5rem 0;
      }
      .btn {
        padding: 0.8rem 1.6rem;
        font-size: 1rem;
        margin-top: 2rem;
      }
    }

    /* Tablettes */
    @media (min-width: 769px) and (max-width: 1024px) {
      h1 {
        font-size: 2.4rem;
      }
      p.slogan {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="carousel">
    <!-- Diapositives du carrousel -->
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <!-- Couche de texte par dessus -->
    <div class="overlay">
      <h1>A&nbsp;KI PRI SA YÉ</h1>
      <p class="slogan">Gérez votre budget facilement</p>
      <p class="slogan">Comparez les prix et luttez contre la vie chère</p>
      <a href="#app" class="btn">Découvrir l'application</a>
    </div>
  </div>

  <!-- Enregistrement du Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('/service-worker.js')
          .catch(function (err) {
            console.error('Échec de l\'enregistrement du service worker :', err);
          });
      });
    }
  </script>
</body>
</html>
