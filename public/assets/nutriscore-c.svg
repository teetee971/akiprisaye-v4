<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <title>Nutri-Score C</title>
  <defs>
    <linearGradient id="bgGradientC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4b100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecb02;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="100" rx="10" fill="url(#bgGradientC)"/>
  
  <!-- Logo section -->
  <text x="15" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">NUTRI-SCORE</text>
  
  <!-- Grade badges -->
  <g id="grades">
    <!-- A - Dimmed -->
    <rect x="15" y="45" width="30" height="40" rx="5" fill="white" opacity="0.4"/>
    <text x="30" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#038141" text-anchor="middle" opacity="0.4">A</text>
    
    <!-- B - Dimmed -->
    <rect x="50" y="45" width="30" height="40" rx="5" fill="white" opacity="0.4"/>
    <text x="65" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#85BB2F" text-anchor="middle" opacity="0.4">B</text>
    
    <!-- C - Active/Highlighted -->
    <rect x="85" y="45" width="30" height="40" rx="5" fill="white"/>
    <text x="100" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FECB02" text-anchor="middle">C</text>
    
    <!-- D - Dimmed -->
    <rect x="120" y="45" width="30" height="40" rx="5" fill="white" opacity="0.4"/>
    <text x="135" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#EE8100" text-anchor="middle" opacity="0.4">D</text>
    
    <!-- E - Dimmed -->
    <rect x="155" y="45" width="30" height="40" rx="5" fill="white" opacity="0.4"/>
    <text x="170" y="72" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E63E11" text-anchor="middle" opacity="0.4">E</text>
  </g>
</svg>
