<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>DOM-TOM Icon Simple</title>
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ocean background -->
  <circle cx="32" cy="32" r="32" fill="url(#oceanGradient)"/>
  
  <!-- French flag colors integrated -->
  <path d="M32 4 A28 28 0 0 1 60 32 L32 32 Z" fill="#0055A4" opacity="0.3"/>
  <path d="M32 32 L60 32 A28 28 0 0 1 32 60 Z" fill="#EF4135" opacity="0.3"/>
  
  <!-- Island/territory representations -->
  <g id="islands">
    <!-- Main tropical island -->
    <ellipse cx="32" cy="32" rx="16" ry="12" fill="#2d5016"/>
    <ellipse cx="32" cy="33" rx="14" ry="10" fill="#4a7c2c"/>
    
    <!-- Palm tree -->
    <rect x="30" y="28" width="2" height="8" fill="#6b4423"/>
    <ellipse cx="31" cy="26" rx="4" ry="3" fill="#2d5016"/>
    <path d="M27 26 Q31 24 35 26" fill="#4a7c2c"/>
    
    <!-- Beach/sand -->
    <ellipse cx="32" cy="40" rx="12" ry="3" fill="#f4d03f" opacity="0.6"/>
  </g>
  
  <!-- Stars representing territories -->
  <g id="territoryStars" fill="white" opacity="0.8">
    <circle cx="12" cy="16" r="1.5"/>
    <circle cx="52" cy="16" r="1.5"/>
    <circle cx="12" cy="48" r="1.5"/>
    <circle cx="52" cy="48" r="1.5"/>
    <circle cx="32" cy="8" r="1.5"/>
  </g>
  
  <!-- Text overlay -->
  <text x="32" y="56" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">DOM-TOM</text>
</svg>
