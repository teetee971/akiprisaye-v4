<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A&nbsp;KI PRI SA YÉ — Gérez votre budget</title>
  <meta name="description" content="Comparez les prix, gérez votre budget facilement et luttez contre la vie chère." />
  
  <!-- Manifest et icônes pour mode PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icon_192.png" />
  <link rel="icon" type="image/png" sizes="256x256" href="./assets/icon_256.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/icon_512.png" />
  <link rel="apple-touch-icon" href="./assets/icon_192.png" />
  <meta name="theme-color" content="#0b0d17" />
  
  <!-- Préchargement des images critiques -->
  <link rel="preload" as="image" href="./assets/84ba022c-9450-4e4f-841b-64d5363aaae1_lg.webp" />
  <link rel="preload" as="image" href="./assets/b3ced496-7272-4600-b46e-c14cf625667e_lg.webp" />
  <link rel="preload" as="image" href="./assets/0d3bd9ac-734a-4f7d-b671-6dc715ae9e94_lg.webp" />
  
  <!-- Feuille de style -->
  <link rel="stylesheet" href="./styles.css" />
  
  <!-- Meta tags SEO et réseaux sociaux -->
  <meta property="og:title" content="A KI PRI SA YÉ — Gérez votre budget" />
  <meta property="og:description" content="Comparez les prix, gérez votre budget facilement et luttez contre la vie chère." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://akiprisaye-web.pages.dev" />
  <meta property="og:image" content="./assets/splash.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="A KI PRI SA YÉ — Gérez votre budget" />
  <meta name="twitter:description" content="Comparez les prix, gérez votre budget facilement et luttez contre la vie chère." />
</head>
<body>
  <!-- Spinner de chargement -->
  <div id="loading-spinner" class="loading-spinner">
    <div class="spinner"></div>
  </div>
  
  <!-- Carrousel principal -->
  <div class="carousel" id="carousel">
    <!-- Diapositives du carrousel -->
    <div class="slide" data-image="1"></div>
    <div class="slide" data-image="2"></div>
    <div class="slide" data-image="3"></div>
    
    <!-- Couche de texte par dessus -->
    <div class="overlay">
      <h1>A&nbsp;KI PRI SA YÉ</h1>
      <p class="slogan">Gérez votre budget facilement</p>
      <p class="slogan">Comparez les prix et luttez contre la vie chère</p>
      <a href="#app" class="btn" id="discover-btn">Découvrir l'application</a>
    </div>
  </div>

  <!-- Scripts d'amélioration -->
  <script>
    // Configuration
    const CONFIG = {
      images: [
        './assets/84ba022c-9450-4e4f-841b-64d5363aaae1_lg.webp',
        './assets/b3ced496-7272-4600-b46e-c14cf625667e_lg.webp',
        './assets/0d3bd9ac-734a-4f7d-b671-6dc715ae9e94_lg.webp'
      ],
      preloadDelay: 100,
      checkDelay: 2000
    };
    
    // Logger amélioré
    const Logger = {
      log: (message, type = 'info') => {
        const timestamp = new Date().toLocaleTimeString();
        const emoji = {
          'info': 'ℹ️',
          'success': '✅',
          'error': '❌',
          'warning': '⚠️',
          'debug': '🔍'
        };
        console.log(`${emoji[type]} [${timestamp}] ${message}`);
      }
    };
    
    // Gestion du spinner de chargement
    const LoadingManager = {
      spinner: null,
      
      init() {
        this.spinner = document.getElementById('loading-spinner');
      },
      
      show() {
        if (this.spinner) {
          this.spinner.style.display = 'block';
        }
      },
      
      hide() {
        if (this.spinner) {
          this.spinner.style.display = 'none';
        }
      }
    };
    
    // Gestionnaire d'images amélioré
    const ImageManager = {
      loadedImages: new Set(),
      failedImages: new Set(),
      
      // Préchargement intelligent des images
      preloadImages() {
        Logger.log('Début du préchargement des images', 'info');
        
        CONFIG.images.forEach((url, index) => {
          setTimeout(() => {
            this.loadImage(url, index + 1);
          }, index * CONFIG.preloadDelay);
        });
      },
      
      // Chargement individuel d'une image
      loadImage(url, imageNumber) {
        const img = new Image();
        
        img.onload = () => {
          this.loadedImages.add(url);
          Logger.log(`Image ${imageNumber} chargée: ${url}`, 'success');
          this.checkAllImagesLoaded();
        };
        
        img.onerror = () => {
          this.failedImages.add(url);
          Logger.log(`Erreur Image ${imageNumber}: ${url}`, 'error');
          this.markSlideAsError(imageNumber);
        };
        
        // Ajout d'un timestamp pour éviter le cache en cas de problème
        img.src = url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
      },
      
      // Vérification que toutes les images sont chargées
      checkAllImagesLoaded() {
        const totalImages = CONFIG.images.length;
        const loadedCount = this.loadedImages.size;
        const failedCount = this.failedImages.size;
        
        if (loadedCount + failedCount >= totalImages) {
          LoadingManager.hide();
          
          if (loadedCount === totalImages) {
            Logger.log('🎉 Toutes les images sont chargées !', 'success');
          } else {
            Logger.log(`⚠️ ${failedCount} image(s) ont échoué à charger`, 'warning');
          }
        }
      },
      
      // Marquer une slide comme ayant une erreur
      markSlideAsError(imageNumber) {
        const slides = document.querySelectorAll('.slide');
        if (slides[imageNumber - 1]) {
          slides[imageNumber - 1].classList.add('error');
        }
      },
      
      // Vérification des images background-image après chargement
      checkBackgroundImages() {
        Logger.log('Vérification des images de fond...', 'debug');
        
        const slides = document.querySelectorAll('.slide');
        let successCount = 0;
        
        slides.forEach((slide, index) => {
          const computedStyle = window.getComputedStyle(slide);
          const bgImage = computedStyle.backgroundImage;
          
          if (bgImage && bgImage !== 'none' && !bgImage.includes('url("")')) {
            successCount++;
            Logger.log(`✅ Slide ${index + 1}: Image de fond OK`, 'success');
          } else {
            slide.classList.add('error');
            Logger.log(`❌ Slide ${index + 1}: Image de fond manquante`, 'error');
          }
        });
        
        Logger.log(`📊 Résultat: ${successCount}/${slides.length} images de fond chargées`, 'info');
      }
    };
    
    // Gestionnaire d'interface utilisateur
    const UIManager = {
      init() {
        this.setupDiscoverButton();
        this.setupKeyboardNavigation();
      },
      
      setupDiscoverButton() {
        const btn = document.getElementById('discover-btn');
        if (btn) {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            this.showAppInfo();
          });
        }
      },
      
      setupKeyboardNavigation() {
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && e.target.classList.contains('btn')) {
            e.target.click();
          }
        });
      },
      
      showAppInfo() {
        const message = `
🚀 A KI PRI SA YÉ - Application en développement

📱 Fonctionnalités à venir :
• Comparaison de prix en temps réel
• Gestion de budget personnalisé
• Alertes sur les promotions
• Analyse des tendances prix
• Mode hors ligne

💡 Restez connectés pour les prochaines mises à jour !

🌐 Version web bientôt disponible sur tous les appareils.
        `.trim();
        
        alert(message);
        Logger.log('Informations de l\'app affichées', 'info');
      }
    };
    
    // Service Worker Manager
    const ServiceWorkerManager = {
      async register() {
        if ('serviceWorker' in navigator) {
          try {
            const registration = await navigator.serviceWorker.register('./service-worker.js');
            Logger.log('Service Worker enregistré avec succès', 'success');
            return registration;
          } catch (error) {
            Logger.log(`Échec du Service Worker: ${error.message}`, 'error');
          }
        } else {
          Logger.log('Service Worker non supporté', 'warning');
        }
      }
    };
    
    // Initialisation principale
    class App {
      constructor() {
        this.initialized = false;
      }
      
      async init() {
        if (this.initialized) return;
        
        Logger.log('🚀 Initialisation de A KI PRI SA YÉ', 'info');
        
        // Initialisation des composants
        LoadingManager.init();
        LoadingManager.show();
        
        UIManager.init();
        
        // Préchargement des images
        ImageManager.preloadImages();
        
        // Vérifications après délai
        setTimeout(() => {
          ImageManager.checkBackgroundImages();
        }, CONFIG.checkDelay);
        
        // Enregistrement du Service Worker
        await ServiceWorkerManager.register();
        
        this.initialized = true;
        Logger.log('✅ Application initialisée avec succès', 'success');
      }
    }
    
    // Démarrage de l'application
    const app = new App();
    
    // Événements de chargement
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => app.init());
    } else {
      app.init();
    }
    
    // Événement de chargement complet
    window.addEventListener('load', () => {
      Logger.log('📄 Ressources de la page entièrement chargées', 'info');
      
      // Vérification finale après 1 seconde
      setTimeout(() => {
        ImageManager.checkBackgroundImages();
      }, 1000);
    });
    
    // Gestion des erreurs globales
    window.addEventListener('error', (event) => {
      Logger.log(`Erreur globale: ${event.message}`, 'error');
    });
    
    // Detection des erreurs de ressources
    window.addEventListener('error', (event) => {
      if (event.target.tagName === 'IMG') {
        Logger.log(`Erreur de chargement d'image: ${event.target.src}`, 'error');
      }
    }, true);
  </script>
</body>
</html>
