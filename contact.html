    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0b0d17;
      color: #ffffff;
    }
    
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    
    h1 {
      color: #0f62fe;
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .contact-form {
      background: #1a1d2e;
      border-radius: 12px;
      padding: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #b8b8b8;
      font-weight: 500;
    }
    
    input, textarea {
      width: 100%;
      padding: 0.75rem;
      background: #0b0d17;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      color: #ffffff;
      font-family: inherit;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #0f62fe;
    }
    
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #0f62fe, #0353e9);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15, 98, 254, 0.4);
    }
    
    .contact-info {
      margin-top: 2rem;
      text-align: center;
      color: #b8b8b8;
    }

  <header class="shared-header">
    <div class="shared-header-content">
      <div style="display: flex; align-items: center; gap: 1rem;">

  <main>
    <h1>📧 Contactez-nous</h1>
    
    <form class="contact-form">
      <div class="form-group">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label for="subject">Sujet</label>
        <input type="text" id="subject" name="subject" required>
      </div>
      
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      
      <button type="submit">Envoyer le message</button>
    </form>
    
    <div class="contact-info">
      <p>Vous pouvez aussi nous joindre par email :</p>
      <p><strong>contact@akiprisaye.fr</strong></p>
    </div>
  </main>
