# NOTE: manual-only to avoid duplicate Cloudflare deployments.
# Primary workflow: ci-cd-industrial.yml (single source of deployment)
name: A KI PRI SA YÉ - Observatoire Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-code:
    name: 🔍 Validation Code
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🧹 Lint full codebase (non-blocking)
        working-directory: frontend
        run: npm run lint:full:ci
        continue-on-error: true

      - name: 🧪 Run tests
        working-directory: frontend
        run: npm test

      - name: 📊 Test summary
        if: always()
        run: |
          echo "## Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  validate-data:
    name: 🔐 Validation Données
    runs-on: ubuntu-latest
    needs: validate-code
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: ℹ️ Dependencies
        run: echo "Scripts use only built-in Node.js modules - no dependencies needed"

      - name: 🔍 Validate data files
        run: node scripts/validate-data.js

      - name: 🔍 Validate observatoire data
        run: node scripts/validate-observatoire-data.js

      - name: 📊 Data validation summary
        if: always()
        run: |
          echo "## Data Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Rules Applied:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ No numeric value without source" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Status='non_disponible' → value=null" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ ISO date format validated" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Valid source URLs" >> "$GITHUB_STEP_SUMMARY"

  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: [validate-code, validate-data]
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build production
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🔍 Verify build output
        run: |
          if [ ! -f "frontend/dist/index.html" ]; then
            echo "❌ frontend/dist/index.html not found"
            exit 1
          fi

          if [ ! -d "frontend/dist/assets" ]; then
            echo "❌ frontend/dist/assets directory not found"
            exit 1
          fi

          if [ -d "frontend/dist/Assets" ]; then
            echo "❌ frontend/dist/Assets/ found (should be lowercase 'assets')"
            exit 1
          fi

          echo "✅ Build output verified"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 7

      - name: 📊 Build summary
        if: always()
        run: |
          echo "## Build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Output:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`frontend/dist/index.html\` ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`frontend/dist/assets/\` ✅" >> "$GITHUB_STEP_SUMMARY"

  validate-security:
    name: 🔒 Validation Sécurité
    runs-on: ubuntu-latest
    needs: build-frontend
    timeout-minutes: 10

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🔍 Check CSP headers
        run: |
          if [ ! -f "frontend/public/_headers" ]; then
            echo "⚠️  _headers file not found (non-blocking)"
            exit 0
          fi

          if grep -q "Content-Security-Policy" frontend/public/_headers; then
            echo "✅ CSP headers found"
          else
            echo "⚠️  CSP headers not found (optional)"
          fi

      - name: 🔍 Check for exposed secrets
        run: |
          if grep -RInE "(API[_-]?KEY|SECRET[_-]?KEY|PRIVATE[_-]?KEY|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY)" dist/ 2>/dev/null | grep -v "\.map"; then
            echo "❌ Potential secrets found in build"
            exit 1
          fi
          echo "✅ No exposed secrets found"

      - name: 🔍 Verify RGPD compliance (basic)
        run: |
          if grep -RInE "(google-analytics|googletagmanager|gtag\(|facebook\.com/tr|connect\.facebook\.net)" dist/ 2>/dev/null | grep -v "\.map"; then
            echo "❌ Third-party trackers found - RGPD violation"
            exit 1
          fi
          echo "✅ RGPD compliant - No common trackers found"

      - name: 📊 Security summary
        if: always()
        run: |
          echo "## Security" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Checks:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ No exposed secrets (heuristic)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ RGPD: no common trackers detected" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ CSP headers check done" >> "$GITHUB_STEP_SUMMARY"

  report:
    name: 📋 Final Report
    runs-on: ubuntu-latest
    needs: [validate-code, validate-data, build-frontend, validate-security]
    if: always()
    timeout-minutes: 5

    steps:
      - name: 📊 Generate final report
        run: |
          echo "# 🎯 A KI PRI SA YÉ - Observatoire Pipeline Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Status" >> "$GITHUB_STEP_SUMMARY"
          echo "- Code Validation: ${{ needs.validate-code.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Data Validation: ${{ needs.validate-data.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build: ${{ needs.build-frontend.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Security: ${{ needs.validate-security.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Principles Applied" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ No invented data" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Official sources only" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Full traceability" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ RGPD oriented checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ No deployment in this workflow (CI-only). Deployment is handled by ci-cd-industrial.yml." >> "$GITHUB_STEP_SUMMARY"
