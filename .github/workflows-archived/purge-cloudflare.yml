# .github/workflows/purge-cloudflare.yml
name: Purge Cloudflare Cache (manual-only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    name: Purge cache (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Purge everything (zone)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID secrets."
            exit 1
          fi
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee /tmp/cf_purge.json
          echo "### Cloudflare purge result" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/cf_purge.json >> "$GITHUB_STEP_SUMMARY"