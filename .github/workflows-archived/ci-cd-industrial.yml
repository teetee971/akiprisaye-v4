# Single source of Cloudflare deployment: THIS workflow only.
name: 🚀 CI/CD Pipeline Industriel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  NODE_VERSION: '20.19.0'
  DEPLOYMENT_URL: 'https://akiprisaye-web.pages.dev'
  CLOUDFLARE_PROJECT_NAME: 'akiprisaye-web'

concurrency:
  group: ci-cd-industrial-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: 1️⃣ Preflight Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔐 Verify Cloudflare secrets (without logging)
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN not set"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID not set"
            exit 1
          fi
          echo "✅ Required Cloudflare secrets are set"

      - name: 🛡️ Guard against double-deploy regressions
        run: |
          set -e
          # deploy.yml must stay manual-only (if it exists)
          if [ -f ".github/workflows/deploy.yml" ]; then
            if grep -nE '^[[:space:]]*push:' .github/workflows/deploy.yml; then
              echo "❌ Regression: deploy.yml reintroduced push trigger"
              exit 1
            fi
            if ! grep -nE '^[[:space:]]*workflow_dispatch:' .github/workflows/deploy.yml >/dev/null; then
              echo "❌ Regression: deploy.yml missing workflow_dispatch"
              exit 1
            fi
            echo "✅ deploy.yml is manual-only"
          fi

          # observatory must NOT deploy
          if grep -RIn "cloudflare/pages-action@v1|wrangler pages deploy" .github/workflows/observatory-pipeline.yml >/dev/null 2>&1; then
            echo "❌ Regression: observatory pipeline contains a deploy action"
            exit 1
          fi
          echo "✅ observatory pipeline is CI-only"

  build:
    name: 2️⃣ Install & Build
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 📝 Generate version info
        run: ./scripts/generate-version.sh frontend/public/version.json

      - name: 🏗️ Build application
        working-directory: frontend
        run: npm run build

      - name: 📋 Verify build output
        run: ./scripts/verify-build.sh

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  integrity-check:
    name: 3️⃣ Static Integrity Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🔍 Check asset integrity
        run: ./scripts/check-asset-integrity.sh

  routing-check:
    name: 4️⃣ SPA Routing Guard
    continue-on-error: true
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🔍 Verify routing placeholders
        run: node frontend/scripts/verify-placeholder-routing.mjs

  lighthouse:
    name: 5️⃣ Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: ℹ️ Lighthouse placeholder
        run: |
          echo "Lighthouse step present. Add LHCI if needed."
          echo "✅ OK"

  deploy-cloudflare:
    name: 6️⃣ Deploy Cloudflare Pages
    needs: [build, integrity-check, routing-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT_NAME }}
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Deployment summary
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          echo "- Project: ${{ env.CLOUDFLARE_PROJECT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ env.DEPLOYMENT_URL }}" >> $GITHUB_STEP_SUMMARY

  report:
    name: 7️⃣ Final Report
    runs-on: ubuntu-latest
    needs: [preflight, build, integrity-check, routing-check, lighthouse, deploy-cloudflare]
    if: always()
    steps:
      - name: 📊 Generate final report
        run: |
          echo "# A KI PRI SA YÉ - CI/CD Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- Preflight: ${{ needs.preflight.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integrity: ${{ needs.integrity-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Routing: ${{ needs.routing-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Lighthouse: ${{ needs.lighthouse.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy-cloudflare.result }}" >> $GITHUB_STEP_SUMMARY