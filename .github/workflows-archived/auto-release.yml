name: Auto Release

# This workflow runs only after the strict CI workflow succeeds on main.
# It reads the version from package.json, creates a matching tag if missing,
# then publishes a GitHub Release with generated notes. No manual action required.

on:
  workflow_run:
    workflows: ["CI Strict (Zero Warning)"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        id: tag_check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: ${{ steps.tag_check.outputs.exists == 'false' }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: ${{ steps.tag_check.outputs.exists == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "${TAG}" --generate-notes
