name: Smoke Tests

on:
  push:
    branches:
      - main
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      MAX_ATTEMPTS: 5
      RETRY_DELAY: 30
      DEPLOYMENT_WAIT: 60
      CONNECT_TIMEOUT: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Wait for deployment
        run: |
          # Wait for Cloudflare Pages deployment to complete before running tests
          # Cloudflare Pages needs time to deploy after a push to main
          echo "⏳ Waiting for Cloudflare Pages deployment to complete..."
          sleep $DEPLOYMENT_WAIT

      - name: Check root page content
        run: |
          # Retry mechanism for root page check
          max_attempts=$MAX_ATTEMPTS
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔍 Attempt $attempt/$max_attempts: Checking root page..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout $CONNECT_TIMEOUT https://akiprisaye.pages.dev/ 2>/dev/null || echo "000")

            if [ "$response" = "200" ]; then
              echo "✅ Root page returned HTTP 200"

              # Check content
              content=$(curl -s --connect-timeout $CONNECT_TIMEOUT https://akiprisaye.pages.dev/ 2>/dev/null || echo "")
              if echo "$content" | grep -q "A KI PRI SA YÉ"; then
                echo "✅ Root page contains expected content 'A KI PRI SA YÉ'"
                break
              else
                echo "⚠️ Root page accessible but content check failed - retrying..."
                if [ $attempt -eq $max_attempts ]; then
                  echo "❌ Error: Root page does not contain expected content after $max_attempts attempts"
                  exit 1
                fi
                echo "⚠️ Retrying in $RETRY_DELAY seconds..."
                sleep $RETRY_DELAY
              fi
            else
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Error: Root page returned HTTP $response after $max_attempts attempts"
                exit 1
              fi
              echo "⚠️ HTTP $response - retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi

            attempt=$((attempt + 1))
          done

          echo "✅ Root page check passed"

      - name: Check comparateur page
        run: |
          # Retry mechanism for comparateur page check
          max_attempts=$MAX_ATTEMPTS
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔍 Attempt $attempt/$max_attempts: Checking comparateur page..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout $CONNECT_TIMEOUT https://akiprisaye.pages.dev/comparateur.html 2>/dev/null || echo "000")

            if [ "$response" = "200" ]; then
              echo "✅ Comparateur page returned HTTP 200"

              # Check content
              content=$(curl -s --connect-timeout $CONNECT_TIMEOUT https://akiprisaye.pages.dev/comparateur.html 2>/dev/null || echo "")
              if echo "$content" | grep -q "Comparateur"; then
                echo "✅ Comparateur page contains expected content 'Comparateur'"
                break
              else
                echo "⚠️ Comparateur page accessible but content check failed - retrying..."
                if [ $attempt -eq $max_attempts ]; then
                  echo "❌ Error: Comparateur page does not contain expected content after $max_attempts attempts"
                  exit 1
                fi
                echo "⚠️ Retrying in $RETRY_DELAY seconds..."
                sleep $RETRY_DELAY
              fi
            else
              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Error: Comparateur page returned HTTP $response after $max_attempts attempts"
                exit 1
              fi
              echo "⚠️ HTTP $response - retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi

            attempt=$((attempt + 1))
          done

          echo "✅ Comparateur page check passed"

      - name: Check API endpoint
        run: |
          # Retry mechanism for API endpoint check
          max_attempts=$MAX_ATTEMPTS
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "🔍 Attempt $attempt/$max_attempts: Checking API endpoint..."
            response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout $CONNECT_TIMEOUT "https://akiprisaye.pages.dev/api/prices" 2>/dev/null || echo "000")

            if [ "$response" = "404" ]; then
              echo "⚠️ API endpoint not yet deployed (expected for initial PR)"
              exit 0
            fi

            if [ "$response" = "400" ] || [ "$response" = "200" ]; then
              echo "✅ API endpoint responds with HTTP $response"
              break
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "⚠️ Warning: API endpoint returned HTTP $response after $max_attempts attempts"
              echo "⚠️ This may be expected if API is not yet deployed"
              break
            fi

            echo "⚠️ HTTP $response - retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
            attempt=$((attempt + 1))
          done

          echo "✅ API endpoint check completed"

      - name: Summary
        if: success()
        run: |
          echo "🎉 All smoke tests passed!"
          echo "- Root page is accessible and displays correct content"
          echo "- Comparateur page is accessible and displays correct content"
          echo "- API endpoint check completed"
