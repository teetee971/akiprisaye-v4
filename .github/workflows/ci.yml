name: CI

on:
  push:
    branches: [main]
  # `closed` catches merges done by github-actions[bot] (auto-merge via GITHUB_TOKEN)
  # that don't fire the push event. Job-level `if` skips unmerged close events.
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

jobs:
  build-test:
    # Run on push, on PR activity (opened/sync/reopened), or when a PR is merged
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate frontend package-lock.json (must be valid JSON)
        working-directory: frontend
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('package-lock.json OK')"

      - name: Diagnose environment
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          node -v && npm -v
          ls -la
          ls -la frontend
          test -f frontend/package-lock.json && echo OK_LOCK || (echo MISSING_LOCK && exit 1)
          node -e "const p=require('./frontend/package-lock.json'); console.log('lockfileVersion', p.lockfileVersion);"
          sha256sum frontend/package-lock.json || shasum -a 256 frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -p tsconfig.ci.json --noEmit

      - name: Test
        working-directory: frontend
        run: npm run test:ci

  verify-pages:
    # Mirror the same condition as build-test: skip unmerged close events
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (GitHub Pages)
        env:
          GITHUB_PAGES: 'true'
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Verify build paths (GitHub Pages)
        run: node scripts/verify-pages-build.mjs

      - name: Production-like runtime check (GitHub Pages base path)
        run: node scripts/verify-pages-runtime.mjs
