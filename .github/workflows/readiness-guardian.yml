name: Readiness Guardian 24/24
run-name: Readiness Guardian 24/24

on:
  schedule:
    # Surveillance continue toutes les 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: readiness-guardian
  cancel-in-progress: false

jobs:
  monitor:
    name: Vérification conformité 24/24
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit --no-fund

      - name: Run production readiness (network tolerant)
        id: readiness
        run: npm run readiness:prod:network-tolerant

      - name: Résumé succès
        if: ${{ success() }}
        run: |
          echo "## ✅ Readiness Guardian" >> "$GITHUB_STEP_SUMMARY"
          echo "Conformité maintenue sur ce cycle (mode network-tolerant)." >> "$GITHUB_STEP_SUMMARY"

      - name: 'Auto-réparation: relance du déploiement GitHub Pages'
        if: ${{ failure() }}
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });

      - name: Alerte incident readiness (issue)
        if: ${{ failure() }}
        uses: actions/github-script@v9
        with:
          script: |
            // Granularité jour : une seule issue par jour pour éviter l'accumulation
            const dateStr = new Date().toISOString().slice(0, 10);
            const title = `🚨 Readiness Guardian en échec — ${dateStr}`;

            // Éviter les doublons : vérifier si une issue est déjà ouverte pour aujourd'hui
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `${title} in:title repo:${context.repo.owner}/${context.repo.repo} is:open is:issue label:readiness`
            });
            if (existing.data.total_count > 0) {
              core.info(`ℹ️ Issue readiness déjà ouverte pour le ${dateStr} — pas de doublon créé`);
              return;
            }

            const body = [
              'La vérification de conformité 24/24 a échoué.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              '- Auto-réparation tentée: relance de `deploy-pages.yml` sur `main`.',
              '',
              'Actions recommandées:',
              '1. Vérifier les logs du run.',
              '2. Corriger la cause racine (lint/typecheck/tests/build/deploy).',
              '3. Relancer manuellement si nécessaire.',
            ].join('\n');

            // Éviter les doublons : chercher une issue ouverte avec le label readiness
            // créée dans les dernières 2 heures.
            const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
            const since = twoHoursAgo.toISOString();
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `label:readiness label:automatique is:open repo:${context.repo.owner}/${context.repo.repo} is:issue created:>=${since}`,
              sort: 'created',
              order: 'desc',
              per_page: 1,
            });

            const recentIssue = existing.data.items[0] ?? null;

            if (recentIssue) {
              core.info(`ℹ️ Issue readiness déjà ouverte (#${recentIssue.number}) — ajout d'un commentaire`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recentIssue.number,
                body: `🔄 Nouvel échec détecté — ${new Date().toISOString().slice(0, 16)} UTC\n\n- Run: ${runUrl}`,
              });
            } else {
              const title = `🚨 Readiness Guardian en échec — ${new Date().toISOString().slice(0, 16)} UTC`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['monitoring', 'automatique', 'readiness'],
              });
            }

      - name: Fermer issues readiness résolues
        if: ${{ success() }}
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'readiness,automatique',
              state: 'open',
              per_page: 100,
            });

            for (const issue of issues.filter((i) => !i.pull_request)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Résolu automatiquement — le Readiness Guardian est repassé au vert le ${new Date().toISOString().slice(0, 16)} UTC.\n\n- Run: ${runUrl}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }

            if (issues.length > 0) {
              core.info(`✅ ${issues.length} issue(s) readiness fermée(s)`);
            }
