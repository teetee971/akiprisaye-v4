# ──────────────────────────────────────────────────────────────────────────────
# 📊 Snapshot Hebdomadaire de l'Observatoire des Prix
# ──────────────────────────────────────────────────────────────────────────────
#
# Chaque lundi à 8h UTC, génère un snapshot consolidé de l'observatoire :
#   - Agrégation des données prix de la semaine
#   - Analyse éditoriale IA (GPT-4o-mini)
#   - Écriture Firestore (observatory_snapshots/{weekId})
#   - Mise à jour observatoire_latest pour le frontend
# ──────────────────────────────────────────────────────────────────────────────

name: 📊 Snapshot Hebdo Observatoire

on:
  schedule:
    - cron: '0 8 * * 1'   # Chaque lundi à 8h UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  observatory-snapshot:
    name: 📊 Snapshot observatoire
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-observatory/package.json

      - name: 📦 Installer dépendances
        working-directory: scripts/auto-observatory
        run: npm install

      - name: 📊 Générer le snapshot observatoire
        working-directory: scripts/auto-observatory
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SITE_URL: 'https://teetee971.github.io/akiprisaye-web'
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node snapshot.mjs --dry-run
          else
            node snapshot.mjs
          fi

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            core.warning('⚠️ Échec snapshot observatoire');
