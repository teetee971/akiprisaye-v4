name: Lighthouse Audit

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: home
            url: https://akiprisaye.pages.dev/
          - name: comparateur
            url: https://akiprisaye.pages.dev/comparateur
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x
      
      - name: Run Lighthouse (mobile, report-only)
        run: |
          lhci autorun --config=./lighthouserc.report.json \
            --collect.url=${{ matrix.url }} \
            --collect.numberOfRuns=1 \
            --collect.settings.preset=mobile
      
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results-${{ matrix.name }}
          path: .lighthouseci/
