name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Defense-in-depth: if this workflow is ever triggered on a non-main branch
    # (e.g. via workflow_dispatch from a feature branch, or via an old copy of
    # this file that still had a pull_request trigger), the build job is skipped
    # rather than uploading a Pages artifact.  Without this guard, configure-pages
    # + upload-pages-artifact create an orphaned deployment record that can never
    # be deployed (because the deploy job's ref guard refuses to run), leaving a
    # permanent red-cross entry in the GitHub Pages deployment history.
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate package-lock.json (must be valid JSON)
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('package-lock.json OK')"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Validate Firebase API key secret (fail-fast before build)
        run: |
          # Key assembled from parts at runtime so no single literal appears in source
          WRONG_PART_A="AIzaSyDf_mB8z"
          WRONG_PART_B="MWHFwoFhVLyThuKWMTmhB7uSZY"
          WRONG_KEY="${WRONG_PART_A}${WRONG_PART_B}"
          KEY="${VITE_FIREBASE_API_KEY:-}"
          if [ "$KEY" = "$WRONG_KEY" ]; then
            echo "❌ VITE_FIREBASE_API_KEY secret contient l'ANCIENNE mauvaise clé Firebase."
            echo "   → Corrigez le secret VITE_FIREBASE_API_KEY dans les paramètres du dépôt."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "ℹ️  VITE_FIREBASE_API_KEY non défini — le build utilisera le fallback correct dans firebase.ts."
          else
            echo "✅ VITE_FIREBASE_API_KEY présent et distinct de l'ancienne mauvaise clé."
          fi
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          # GitHub Pages project URL is https://teetee971.github.io/akiprisaye-web/
          GITHUB_PAGES: "true"
          BASE_PATH: /akiprisaye-web/
          NODE_OPTIONS: --max-old-space-size=4096
          # Deployment proof — injected into the bundle and into public/version.json
          # via the prebuild script (scripts/generate-version.mjs).
          VITE_BUILD_SHA: ${{ github.sha }}
          # SHORT_SHA is computed by generate-version.mjs as SHA.slice(0,7) — no separate env needed
          VITE_BUILD_REF: ${{ github.ref_name }}
          VITE_BUILD_RUN_ID: ${{ github.run_id }}
          # head_commit.timestamp is null on workflow_dispatch — fall back to runner time
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp || '' }}
          VITE_APP_BUILD_ID: ${{ github.sha }}
          # Firebase web config — injected from repository secrets so the correct
          # apiKey is embedded in the production bundle.  If a secret is not set,
          # frontend/src/lib/firebase.ts falls back to the hardcoded values that
          # match frontend/.env.example (kept in sync with GCP / Firebase Console).
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Verify dist/index.html exists
        run: |
          test -f dist/index.html
          echo "✅ dist/index.html found"

      - name: Verify build paths
        run: node scripts/verify-pages-build.mjs

      - name: Verify version.json was generated
        run: |
          test -f dist/version.json
          echo "✅ dist/version.json found:"
          cat dist/version.json

      - name: Verify version.json fields (mirror check)
        run: node scripts/verify-version-json-fields.mjs
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: SPA fallback — copy index.html → 404.html
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Production-like runtime check (GitHub Pages base path)
        run: node scripts/verify-pages-runtime.mjs

      - name: Debug dist contents
        run: ls -R dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    # Only run when build actually succeeded AND the event is not a pull_request
    # AND the ref is the main branch.
    # Defense-in-depth (two independent guards):
    # 1. github.event_name != 'pull_request' — ensures the deploy step is skipped
    #    (not failed) if a pull_request trigger is ever re-added, preventing red-cross
    #    entries in the GitHub Pages deployment history.
    # 2. github.ref == 'refs/heads/main' — ensures deployment only happens from the
    #    protected main branch, blocking any non-main ref (including workflow_dispatch
    #    invocations from feature branches) from accidentally overwriting production.
    if: >
      needs.build.result == 'success' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Hardcoded URL is more reliable than needs.deploy.outputs.page_url which
    # can be empty when the Pages environment is not yet fully configured.
    env:
      SITE_URL: https://teetee971.github.io/akiprisaye-web/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Verify live deployed version
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_BRANCH: ${{ github.ref_name }}
          MAX_ATTEMPTS: 36
          DELAY_MS: 10000
        run: node frontend/scripts/verify-live-deployment.mjs

      - name: Final proof
        run: |
          echo ""
          echo "🏆 ====================================="
          echo "🏆 PREUVE FINALE – DÉPLOIEMENT VALIDÉ"
          echo "🏆 ====================================="
          echo "🌍 URL : $SITE_URL"
          echo "📌 SHA : ${{ github.sha }}"
          echo "📅 Timestamp : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🚀 Statut : LIVE = VERIFIED BUILD"

  validate:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Validation round 1/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 2
        run: |
          echo "⏳ Waiting 30s before round 2..."
          sleep 30

      - name: Validation round 2/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 3
        run: |
          echo "⏳ Waiting 30s before round 3..."
          sleep 30

      - name: Validation round 3/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Final proof — 3/3 validations passed ✅
        run: |
          echo ""
          echo "🏆 ============================================"
          echo "🏆  PREUVE FINALE — DÉPLOIEMENT 100% VALIDÉ"
          echo "🏆 ============================================"
          echo "✅ Round 1/3 : RÉUSSI"
          echo "✅ Round 2/3 : RÉUSSI"
          echo "✅ Round 3/3 : RÉUSSI"
          echo ""
          echo "🌐 URL      : $SITE_URL"
          echo "🔖 SHA      : ${{ github.sha }}"
          echo "📅 Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🚀 Statut   : 100% VERT — TOUT OK"
