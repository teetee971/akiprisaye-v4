name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate package-lock.json (must be valid JSON)
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('package-lock.json OK')"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # GitHub Pages project URL is https://teetee971.github.io/akiprisaye-web/
          BASE_PATH: /akiprisaye-web/
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_APP_BUILD_ID: ${{ github.sha }}

      - name: Verify build paths
        run: node scripts/verify-pages-build.mjs

      - name: Production-like runtime check (GitHub Pages base path)
        run: node scripts/verify-pages-runtime.mjs

      - name: Debug dist contents
        run: ls -R dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    # Only run when build actually succeeded AND the event is not a pull_request.
    # Defense-in-depth: even if a pull_request trigger were ever re-added to this
    # file, the deploy step would be skipped (not failed) for PR events, preventing
    # red-cross deployment failures in the GitHub Pages environment history.
    if: needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  validate:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Validate live deployment
        run: |
          for attempt in 1 2 3; do
            if node scripts/validate-deployment.mjs "${{ needs.deploy.outputs.page_url }}"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "⏳ Attempt $attempt failed — waiting 30s before retry..."
              sleep 30
            fi
          done
          exit 1
