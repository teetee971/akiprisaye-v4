name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Catches merges done by github-actions[bot] (auto-merge via GITHUB_TOKEN),
  # which do NOT fire the push event. Only deploys on actual merges (merged==true).
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    # Run on push/workflow_dispatch, or when a PR is actually merged (not just closed)
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validate package-lock.json (must be valid JSON)
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('package-lock.json OK')"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_APP_BUILD_ID: ${{ github.sha }}

      - name: Verify build paths
        run: node scripts/verify-pages-build.mjs

      - name: Production-like runtime check (GitHub Pages base path)
        run: node scripts/verify-pages-runtime.mjs

      - name: Debug dist contents
        run: ls -R dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
