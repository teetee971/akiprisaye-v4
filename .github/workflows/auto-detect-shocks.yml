# ──────────────────────────────────────────────────────────────────────────────
# 🔍 Détection Automatique des Chocs de Prix
# ──────────────────────────────────────────────────────────────────────────────
#
# S'exécute après le scraping pour analyser statistiquement les variations
# et créer des alertes si des chocs graves sont détectés (≥20%).
#
# Flux :
#   1. Charge les snapshots Firestore des 30 derniers jours
#   2. Calcule z-scores et variations vs historique
#   3. Génère un résumé IA (GPT-4o-mini)
#   4. Crée un GitHub Issue si choc grave ≥20%
#   5. Écrit les résultats dans Firestore
# ──────────────────────────────────────────────────────────────────────────────

name: 🔍 Détection Chocs de Prix

on:
  schedule:
    - cron: '0 8 * * *'   # 8h UTC — après scraping (6h) + carburants (6h30)
  workflow_run:
    workflows: ['🤖 Scraping Automatique — Prix DOM-TOM']
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write

jobs:
  detect-shocks:
    name: 🔍 Analyse statistique chocs prix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-shocks/package.json

      - name: 📦 Installer dépendances
        working-directory: scripts/auto-shocks
        run: npm install

      - name: 🔍 Détection des chocs
        working-directory: scripts/auto-shocks
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node detect.mjs --dry-run
          else
            node detect.mjs
          fi

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            core.warning('⚠️ Échec détection chocs de prix');
