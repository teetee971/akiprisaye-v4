name: Labeler
on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run labeler
        uses: actions/labeler@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
