name: Executive OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  build-executive-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run Executive OS export script
        run: node scripts/build-executive-os-exports.mjs

      - name: Validate outputs
        run: |
          for f in data/output/executive-kpis.json data/output/executive-risks.json data/output/executive-decisions.json data/output/platform-health.json; do
            if [ ! -f "$f" ]; then
              echo "Missing output: $f"
              exit 1
            fi
          done
          echo "All executive OS outputs present"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: executive-os-outputs
          path: |
            data/output/executive-kpis.json
            data/output/executive-risks.json
            data/output/executive-decisions.json
            data/output/platform-health.json
          retention-days: 7
