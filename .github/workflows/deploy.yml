# NOTE: manual-only to avoid duplicate Cloudflare deployments. Primary workflow: deploy-cloudflare-pages.yml
name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Prévention Git LFS (empêche l'ajout accidentel de pointeurs LFS)
      - name: Disable Git LFS
        working-directory: ..
        run: git config --global filter.lfs.required false

      # Garde préventive : vérifier l'absence de pointeurs LFS
      - name: Check for LFS pointers
        working-directory: ..
        run: |
          if git grep -I -n -E '^version https://git-lfs.github.com/spec/v1$' -- . | grep -vE '^(\.github/workflows/|\.circleci/|scripts/|.*\.md:)' >/dev/null; then
            echo "❌ ERREUR: Pointeurs Git LFS détectés dans le dépôt"
            exit 1
          else
            echo "✅ OK: Aucun pointeur Git LFS détecté"
          fi

          if git grep -I -n -E '^oid sha256:[0-9a-f]{64}$' -- . | grep -vE '^(\.github/workflows/|\.circleci/|scripts/|.*\.md:)' >/dev/null; then
            echo "❌ ERREUR: Pointeur LFS probable (oid)"
            exit 1
          else
            echo "✅ OK: Aucun oid LFS détecté"
          fi

      # Installation de Node.js et mise en cache des dépendances npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      # Installation des dépendances du projet
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Inject build id
        working-directory: ./frontend
        run: echo "VITE_APP_BUILD_ID=${GITHUB_SHA}" >> $GITHUB_ENV

      # Build de l'application Vite/React (génère le dossier dist)
      - name: Build application
        working-directory: ./frontend
        run: npm run build

      # Déploiement Cloudflare Pages + Functions via Wrangler (fiable)
      - name: Deploy to Cloudflare Pages (Wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy frontend/dist \
            --project-name akiprisaye-web \
            --branch main \
            --functions-dir functions

      # Purge du cache inutile (pas de domaine personnalisé)
      - name: Skip cache purge
        if: success()
        working-directory: ..
        run: |
          echo "Purge skipped: Cloudflare Pages without custom domain does not support API cache purge."
