name: 🚀 Deploy A KI PRI SA YÉ Web

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PUBLIC_URL: "https://akiprisaye-web.pages.dev"

jobs:
  # ------------------------
  # 1. Lint & Test
  # ------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests
        run: npm test

  # ------------------------
  # 2. Build Frontend
  # ------------------------
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Build project
        run: npm run build --prefix frontend
        env:
          NODE_ENV: production

      - name: ✅ Check build output
        run: |
          echo "✅ Build completed successfully"
          ls -lah frontend/dist

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  # ------------------------
  # 3. Lighthouse / Performance Audit
  # ------------------------
  lighthouse:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚦 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/comparateur.html
            http://localhost:3000/scanner.html
          temporaryPublicStorage: true

  # ------------------------
  # 4. Deploy to Cloudflare Pages
  # ------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: Vérifier les secrets Cloudflare
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Erreur: définissez les secrets CLOUDFLARE_API_TOKEN et CLOUDFLARE_ACCOUNT_ID dans Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: 🌐 Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: akiprisaye-web
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------
  # 5. Purge Cloudflare Cache
  # ------------------------
  purge-cache:
    needs: deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: ♻️ Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
          -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

  # ------------------------
  # 6. Deploy Firebase Functions (optionnel)
  # ------------------------
  firebase-functions:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy
    permissions:
      contents: read
    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔥 Deploy Firebase Functions
        uses: w9jds/firebase-action@v13
        with:
          args: deploy --only functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ------------------------
  # 7. Notify Deployment Status
  # ------------------------
  notify:
    runs-on: ubuntu-latest
    if: always()
    needs: [deploy]
    permissions:
      contents: read
    steps:
      - name: 🟢 Deployment Success
        if: needs.deploy.result == 'success'
        run: echo "✅ Déploiement réussi ! ${{ env.PUBLIC_URL }}"

      - name: 🔴 Deployment Failed
        if: needs.deploy.result == 'failure'
        run: echo "❌ Échec du déploiement."
