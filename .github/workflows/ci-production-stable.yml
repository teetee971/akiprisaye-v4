name: CI Production Stable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false   # 🔒 empêche les annulations sauvages

jobs:
  build-test:
    name: Build & Test (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Prévention Git LFS (empêche l'ajout accidentel de pointeurs LFS)
      - name: Disable Git LFS
        run: git config --global filter.lfs.required false

      # Garde préventive : vérifier l'absence de pointeurs LFS
      - name: Check for LFS pointers
        run: |
          if git grep -I -n -E '^version https://git-lfs.github.com/spec/v1$' -- . | grep -vE '^(\.github/workflows/|\.circleci/|scripts/|.*\.md:)' >/dev/null; then
            echo "❌ ERREUR: Pointeurs Git LFS détectés dans le dépôt"
            exit 1
          else
            echo "✅ OK: Aucun pointeur Git LFS détecté"
          fi

          if git grep -I -n -E '^oid sha256:[0-9a-f]{64}$' -- . | grep -vE '^(\.github/workflows/|\.circleci/|scripts/|.*\.md:)' >/dev/null; then
            echo "❌ ERREUR: Pointeur LFS probable (oid)"
            exit 1
          else
            echo "✅ OK: Aucun oid LFS détecté"
          fi

      - name: Setup Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies (clean)
        working-directory: frontend
        run: npm ci

      - name: Lint changed files (PR)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          LINT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          LINT_HEAD_SHA: ${{ github.sha }}
        run: node scripts/lint-changed.mjs --max-warnings=0

      - name: Lint full codebase (main/tags)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        working-directory: frontend
        run: npm run lint

      - name: Lint mode summary
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ℹ️ Lint mode: changed-only (PR)"
          else
            echo "ℹ️ Lint mode: strict full lint (push main/tags)"
          fi

      - name: Skip frontend tests (browser-only)
        run: echo "Skipping tests – browser-only frontend"

      - name: Build (read-only)
        working-directory: frontend
        run: npm run build

  snapshot-open-data:
    name: Open-Data Snapshot
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate Open-Data snapshot
        working-directory: frontend
        run: |
          npm run export:open-data
          find exports -type f -exec sha256sum {} \; > exports/CHECKSUMS.sha256

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-data-snapshot-${{ github.ref_name }}
          path: frontend/exports/
          retention-days: 90

  release-assets:
    name: Attach Release Assets
    runs-on: ubuntu-latest
    needs: snapshot-open-data
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download snapshot
        uses: actions/download-artifact@v4
        with:
          name: open-data-snapshot-${{ github.ref_name }}
          path: exports/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: exports/**/*
          fail_on_unmatched_files: false
