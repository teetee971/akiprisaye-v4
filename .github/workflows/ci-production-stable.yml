name: CI Production Stable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false   # 🔒 empêche les annulations sauvages

jobs:
  build-test:
    name: Build & Test (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Prévention Git LFS (empêche l'ajout accidentel de pointeurs LFS)
      - name: Disable Git LFS
        run: git config --global filter.lfs.required false

      # Garde préventive : vérifier l'absence de pointeurs LFS
      - name: Check for LFS pointers
        run: |
          if git grep -I -n "version https://git-lfs.github.com/spec/v1" -- ':!.github/workflows/*' ':!.circleci/*'; then
            echo "❌ ERREUR: Pointeurs Git LFS détectés dans le dépôt"
            exit 1
          else
            echo "✅ OK: Aucun pointeur Git LFS détecté"
          fi

      - name: Setup Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (clean)
        run: npm ci

      - name: Lint (non-blocking)
        run: npm run lint || true

      - name: Skip frontend tests (browser-only)
        run: echo "Skipping tests – browser-only frontend"

      - name: Build (read-only)
        run: npm run build

  snapshot-open-data:
    name: Open-Data Snapshot
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Open-Data snapshot
        run: |
          npm run export:open-data
          find exports -type f -exec sha256sum {} \; > exports/CHECKSUMS.sha256

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-data-snapshot-${{ github.ref_name }}
          path: exports/
          retention-days: 90

  release-assets:
    name: Attach Release Assets
    runs-on: ubuntu-latest
    needs: snapshot-open-data
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download snapshot
        uses: actions/download-artifact@v4
        with:
          name: open-data-snapshot-${{ github.ref_name }}
          path: exports/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: exports/**/*
          fail_on_unmatched_files: false
