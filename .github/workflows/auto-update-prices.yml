# ──────────────────────────────────────────────────────────────────────────────
# ⛽ Mise à Jour Automatique des Prix Carburants DOM-TOM
# ──────────────────────────────────────────────────────────────────────────────
#
# Source : prix-carburants.gouv.fr (données officielles XML gouvernementales)
# Fréquence : quotidienne à 6h30 UTC (après le scraping global)
# Objectif : mise à jour fine des prix carburants + détection chocs
#
# Ce workflow s'exécute après auto-scraping.yml pour les carburants
# ou peut tourner indépendamment en cas de besoin.
# ──────────────────────────────────────────────────────────────────────────────

name: ⛽ Mise à Jour Prix Carburants DOM-TOM

on:
  schedule:
    - cron: '30 6 * * *'   # 6h30 UTC — après auto-scraping.yml
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulation (pas d''écriture)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: auto-update-prices
  cancel-in-progress: false

jobs:
  update-prices:
    name: ⛽ Collecte carburants officiels
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-prices/package.json

      - name: 📦 Installer dépendances
        working-directory: scripts/auto-prices
        run: npm install

      - name: 🔍 Diagnostic secret Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_PRESENT=yes"
          else
            echo "FIREBASE_SERVICE_ACCOUNT_PRESENT=no"
            echo "⚠️  Le secret FIREBASE_SERVICE_ACCOUNT est absent — collecte sans écriture Firestore"
          fi

      - name: ⛽ Collecte des prix carburants
        working-directory: scripts/auto-prices
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node collect.mjs --dry-run
          else
            node collect.mjs
          fi

      - name: 💾 Commit fuel-prices.json
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "akiprisaye-bot[prices]"
          git config user.email "bot-prices@akiprisaye.fr"
          if ! git diff --quiet frontend/public/data/fuel-prices.json; then
            git add frontend/public/data/fuel-prices.json
            git commit \
              -m "⛽ [auto] Prix carburants DOM-TOM — $(date -u '+%Y-%m-%d')" \
              -m "Source : prix-carburants.gouv.fr" \
              -m "Territoires : GP, MQ, GF, RE, YT" \
              -m "[skip ci]"
            git push || echo "⚠️  Push vers main rejeté (règle de protection de branche) — données générées localement, disponibles en artifacts CI"
          else
            echo "ℹ️  Aucune modification fuel-prices.json"
          fi

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            core.warning('⚠️ Échec mise à jour prix carburants');
