name: Node.js CI Audit & Linting

on:
  push:
    branches:
      - main
      - dependabot-ci-config
  pull_request:
    branches:
      - main

jobs:
  build_audit:
    name: Install, Audit, Lint, Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint with ESLint
      run: npm run lint

    - name: Run Tests
      run: npm test

    - name: Audit Dependencies
      run: npm audit --omit=dev --audit-level=high