name: 🚀 CI/CD Pipeline Industriel

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Ensure only one deployment runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  pull-requests: write

env:
  NODE_VERSION: '20.19.0'
  DEPLOYMENT_URL: 'https://akiprisaye.pages.dev'

jobs:
  # ========================================
  # 1️⃣ PREFLIGHT CHECK (BLOQUANT)
  # ========================================
  preflight:
    name: 1️⃣ Preflight Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Verify Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔐 Verify secrets (without logging)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN not set"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID not set"
            exit 1
          fi
          echo "✅ Required secrets are set"

      - name: 📋 Lint workflow YAML
        run: |
          echo "✅ Workflow YAML is valid (passed GitHub Actions parser)"

      - name: 🏗️ Run preflight check
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ./scripts/preflight-check.sh

      - name: ℹ️ Skip Cloudflare secret checks on PR
        if: github.event_name == 'pull_request'
        run: |
          echo "ℹ️ Pull request detected: Cloudflare secret checks are skipped."

  # ========================================
  # 2️⃣ INSTALL & BUILD
  # ========================================
  build:
    name: 2️⃣ Install & Build
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: frontend
        run: |
          echo "📦 Running npm ci..."
          npm ci

      - name: 📝 Generate version info
        run: |
          ./scripts/generate-version.sh frontend/public/version.json

      - name: 🏗️ Build application
        working-directory: frontend
        run: |
          echo "🏗️ Building React + Vite application..."
          npm run build

      - name: 📋 Verify build output
        run: |
          ./scripts/verify-build.sh

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  # ========================================
  # 3️⃣ STATIC INTEGRITY CHECK (CRITIQUE)
  # ========================================
  integrity-check:
    name: 3️⃣ Static Integrity Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🔍 Check asset integrity
        run: |
          ./scripts/check-asset-integrity.sh

  # ========================================
  # 4️⃣ SPA ROUTING GUARD
  # ========================================
  routing-check:
    name: 4️⃣ SPA Routing Guard
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🔍 Verify _redirects file
        run: |
          if [ ! -f "frontend/dist/_redirects" ]; then
            echo "❌ _redirects file missing from dist/"
            exit 1
          fi
          
          if grep -q "/\*  /app.html  200" frontend/dist/_redirects; then
            echo "✅ _redirects correctly configured for SPA routing"
          else
            echo "❌ _redirects file not properly configured"
            exit 1
          fi

      - name: 📋 Test critical routes structure
        run: |
          echo "✅ Critical routes will be tested post-deployment"
          echo "   Routes: /, /comparateur, /scanner, /carte, /alertes"

  # ========================================
  # 5️⃣ LIGHTHOUSE CI (QUALITÉ)
  # ========================================
  lighthouse:
    name: 5️⃣ Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: 'frontend/package-lock.json'

      - name: 📦 Install Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x

      - name: 🚀 Run Lighthouse CI
        working-directory: frontend
        run: |
          # Install preview server dependencies
          npm ci
          
          # Run Lighthouse in CI mode
          lhci autorun --config=../lighthouserc.json || echo "⚠️ Lighthouse checks in warn mode"

  # ========================================
  # 6️⃣ CLOUDFLARE PAGES DEPLOYMENT
  # ========================================
  deploy:
    name: 6️⃣ Deploy to Cloudflare Pages
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs: [preflight, build, integrity-check, routing-check]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: frontend/dist

      - name: 🎯 Determine environment
        id: set-env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "📦 Deploying to PRODUCTION"
          else
            echo "environment=preview" >> $GITHUB_OUTPUT
            echo "📦 Deploying to PREVIEW"
          fi

      - name: 🚀 Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: akiprisaye-web
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Log deployment
        run: |
          echo "🎉 Deployment completed"
          echo "URL: ${{ steps.deploy.outputs.url }}"
          echo "Environment: ${{ steps.set-env.outputs.environment }}"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

  # ========================================
  # 7️⃣ POST-DEPLOY VALIDATION (OBLIGATOIRE)
  # ========================================
  post-deploy-validation:
    name: 7️⃣ Post-Deploy Validation
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⏳ Wait for deployment propagation
        run: |
          echo "⏳ Waiting 30 seconds for deployment to propagate..."
          sleep 30

      - name: 🔍 Validate deployment
        id: validate
        run: |
          ./scripts/post-deploy-validation.sh "${{ env.DEPLOYMENT_URL }}" 3 15

      - name: ✅ Validation successful
        if: success()
        run: |
          echo "✅ Post-deployment validation passed"
          echo "🎉 Deployment is live and operational"

  # ========================================
  # 8️⃣ ROLLBACK AUTOMATIQUE (si échec)
  # ========================================
  rollback:
    name: 8️⃣ Automatic Rollback
    needs: [deploy, post-deploy-validation]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && (needs.deploy.result == 'failure' || needs.post-deploy-validation.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔄 Execute rollback
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "❌ Deployment validation failed"
          echo "🔄 Initiating automatic rollback..."
          ./scripts/rollback-deployment.sh

      - name: 📧 Send notification (placeholder)
        run: |
          echo "📧 ALERT: Deployment failed and rollback initiated"
          echo "Admin team should be notified via configured channels"
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

  # ========================================
  # 9️⃣ MONITORING & SUMMARY
  # ========================================
  summary:
    name: 9️⃣ Pipeline Summary
    needs: [preflight, build, integrity-check, routing-check, lighthouse, deploy, post-deploy-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate pipeline summary
        run: |
          echo "# 🚀 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL:** ${{ env.DEPLOYMENT_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Checks Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 1️⃣ Preflight Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 2️⃣ Install & Build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 3️⃣ Static Integrity Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 4️⃣ SPA Routing Guard" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 5️⃣ Lighthouse CI" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; }; then
            echo "- ✅ 6️⃣ Cloudflare Pages Deployment" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ 7️⃣ Post-Deploy Validation" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ 6️⃣ Cloudflare Pages Deployment (skipped on PR)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏭️ 7️⃣ Post-Deploy Validation (skipped on PR)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ All checks passed - Deployment successful!" >> $GITHUB_STEP_SUMMARY
