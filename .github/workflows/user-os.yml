name: User OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  build-user-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run User OS export script
        run: node scripts/build-user-os-exports.mjs

      - name: Validate outputs
        run: |
          for f in data/output/user-favorites-model.json data/output/user-retention-priority.json data/output/user-recommendations.json data/output/user-push-priority.json; do
            if [ ! -f "$f" ]; then
              echo "Missing output: $f"
              exit 1
            fi
          done
          echo "All user OS outputs present"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: user-os-outputs
          path: |
            data/output/user-favorites-model.json
            data/output/user-retention-priority.json
            data/output/user-recommendations.json
            data/output/user-push-priority.json
          retention-days: 7
