name: Partner Discovery

on:
  # Run weekly on Monday at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * 1'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Node 20+ required for native fetch API
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run partner discovery
        run: npm run discover:partners
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code partners/candidates.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update partner candidates from OSM discovery'
          title: '🔄 Automated Partner Discovery Update'
          body: |
            ## Partner Discovery Results
            
            This PR contains automated updates from the OpenStreetMap partner discovery process.
            
            ### Summary
            - **Generated**: ${{ github.run_id }}
            - **Triggered by**: ${{ github.event_name }}
            - **Territories scanned**: GP, MQ, GF, RE, YT
            
            ### Next Steps
            1. Review the discovered candidates in `partners/candidates.json`
            2. Manually verify promising candidates
            3. Update `partners/partners.yaml` with selected partners
            4. Merge this PR if changes are acceptable
            
            ---
            *This PR was automatically created by the Partner Discovery workflow.*
          branch: automated/partner-discovery
          delete-branch: true
          labels: |
            automated
            partners
            discovery
      
      - name: Summary
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "✅ No new partner candidates found." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The OSM discovery ran successfully but didn't find any new candidates." >> $GITHUB_STEP_SUMMARY
