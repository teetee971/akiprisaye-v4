name: Deploy price-api (D1 + Worker)

on:
  push:
    branches: [main]
    paths:
      - "price-api/**"
      - ".github/workflows/price-api-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: price-api-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: price-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: price-api/package-lock.json

      - name: Install deps
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

      - name: Vérifier le token Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN absent — déploiement impossible."
            echo "   📄 Guide de configuration : CLOUDFLARE_SETUP.md"
            echo "   Permissions requises : Compte | Workers D1 + Scripts Workers + Pages | Modifier"
            exit 1
          fi
          echo "✅ CLOUDFLARE_API_TOKEN présent"

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.68.0 d1 migrations apply price-db --remote

      - name: Ensure R2 bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          BUCKET_NAME="price-imports"
          echo "🔎 Checking R2 bucket '$BUCKET_NAME'"

          if npx --yes wrangler@4.68.0 r2 bucket info "$BUCKET_NAME" >/tmp/r2_bucket_info.txt 2>/tmp/r2_bucket_info.err; then
            echo "✅ Bucket '$BUCKET_NAME' already exists"
            exit 0
          fi

          if grep -Eqi "(not found|does not exist|Couldn't find)" /tmp/r2_bucket_info.err; then
            echo "🪣 Bucket '$BUCKET_NAME' not found, creating it"
            npx --yes wrangler@4.68.0 r2 bucket create "$BUCKET_NAME"
            echo "✅ Bucket '$BUCKET_NAME' created"
            exit 0
          fi

          echo "❌ Unable to determine R2 bucket status"
          cat /tmp/r2_bucket_info.err
          exit 1

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4.68.0 deploy
