name: Catalogue auto-index and checks

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

jobs:
  auto-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "Scripts use only built-in Node.js modules - no dependencies needed"

      - name: Run generate-index
        run: node ./scripts/generate-index.mjs

      - name: Run flag-promos
        run: node ./scripts/flag-promos.mjs || true

      - name: Validate catalogue
        run: node ./scripts/validate-catalogue.mjs || true

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data/catalogue.json public/data/catalogue.index.json || true
          if git diff --staged --quiet; then echo "No changes"; else git commit -m "chore(ci): update auto-generated pages index and catalogue artifacts"; git push; fi
