# ──────────────────────────────────────────────────────────────────────────────
# 🔍 Scan Produit On-Demand — Temps Réel Multi-Territoire
# ──────────────────────────────────────────────────────────────────────────────
#
# Ce workflow permet de scanner le prix d'un ou plusieurs produits en temps
# quasi-réel sur tous les territoires DOM-TOM (Guadeloupe, Martinique, Guyane,
# La Réunion, Mayotte) en interrogeant Open Food Facts + Open Prices.
#
# Déclenchement :
#   - Manuel uniquement (workflow_dispatch) depuis l'onglet Actions
#   - API GitHub (POST /repos/{owner}/{repo}/actions/workflows/scan-product.yml/dispatches)
#
# Entrées :
#   ean         : Code-barres EAN du produit (ex: 3017620422003 pour Nutella)
#   eans        : Plusieurs EANs séparés par virgule
#   territory   : Territoire(s) — all | gp | mq | gf | re | yt
#   panier_base : Scanner les ~10 produits de base du panier DOM-TOM
#   save_json   : Sauvegarder le résultat dans frontend/public/data/ (commit)
#
# Sources interrogées :
#   - Open Food Facts API (ODbL)  — fiche produit + nutriments
#   - Open Prices API   (ODbL)  — prix contributifs par territoire
#
# Secrets requis :
#   FIREBASE_SERVICE_ACCOUNT — Pour écriture Firestore (optionnel)
# ──────────────────────────────────────────────────────────────────────────────

name: 🔍 Scan Produit — Prix Temps Réel DOM-TOM

on:
  workflow_dispatch:
    inputs:
      ean:
        description: 'EAN/code-barres du produit (ex: 3017620422003)'
        required: false
        type: string
      eans:
        description: 'Plusieurs EANs séparés par virgule (ex: 3017620422003,3068320113901)'
        required: false
        type: string
      territory:
        description: 'Territoire(s) à scanner'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - gp
          - mq
          - gf
          - re
          - yt
          - gp,mq
          - gp,mq,gf,re,yt
      panier_base:
        description: 'Scanner les produits du panier de base DOM-TOM (~10 articles)'
        required: false
        default: false
        type: boolean
      save_json:
        description: 'Sauvegarder résultats dans frontend/public/data/ (commit auto)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: scan-product-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: 🔍 Scan produit on-demand
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-scraper/package-lock.json

      - name: 📦 Installer dépendances scraper
        working-directory: scripts/auto-scraper
        run: npm ci

      - name: 🔍 Validation des paramètres
        run: |
          EAN="${{ inputs.ean }}"
          EANS="${{ inputs.eans }}"
          PANIER="${{ inputs.panier_base }}"

          if [ -z "$EAN" ] && [ -z "$EANS" ] && [ "$PANIER" != "true" ]; then
            echo "❌ Erreur : fournissez --ean, --eans ou activez panier_base"
            exit 1
          fi

          if [ -n "$EAN" ]; then
            # Validate EAN format (8 or 13 digits)
            if ! echo "$EAN" | grep -qE '^[0-9]{8}([0-9]{5})?$'; then
              echo "❌ EAN invalide : '$EAN' (doit être 8 ou 13 chiffres)"
              exit 1
            fi
          fi

          echo "✅ Paramètres validés"

      - name: 🔍 Scan produit
        working-directory: scripts/auto-scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          ARGS=""
          OUTPUT_MODE="console"

          if [ "${{ inputs.save_json }}" = "true" ]; then
            OUTPUT_MODE="both"
          fi

          if [ "${{ inputs.panier_base }}" = "true" ]; then
            node scrape-product.mjs --panier --territory "${{ inputs.territory }}" --output "$OUTPUT_MODE"
          elif [ -n "${{ inputs.eans }}" ]; then
            node scrape-product.mjs --eans "${{ inputs.eans }}" --territory "${{ inputs.territory }}" --output "$OUTPUT_MODE"
          else
            node scrape-product.mjs --ean "${{ inputs.ean }}" --territory "${{ inputs.territory }}" --output "$OUTPUT_MODE"
          fi

      - name: Configure Git
        if: ${{ inputs.save_json == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push branch
        if: ${{ inputs.save_json == 'true' }}
        run: |
          if [ -z "$(git status --porcelain -- frontend/public/data/)" ]; then
            echo "ℹ️  Aucun fichier JSON modifié"
          else
            git checkout -B auto-data-update
            git add frontend/public/data/*
            git commit -m "Auto-update product scan data"
            git push --force-with-lease origin auto-data-update
          fi

      - name: Create Pull Request
        if: ${{ inputs.save_json == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: auto-data-update
          base: main
          title: "Auto-update product scan data"
          body: "Pull request automatique suite au scraping"

      - name: 📢 Notification échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            core.warning(`⚠️ Échec scan produit EAN: ${{ inputs.ean || inputs.eans || 'panier-base' }}`);
