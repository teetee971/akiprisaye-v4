name: Purge Cloudflare Cache (manual)

on:
  workflow_dispatch:
    inputs:
      purge_everything:
        description: "Purge everything (true) or keep false for future granular purge"
        required: true
        default: "true"

permissions:
  contents: read

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge cache
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          PURGE_EVERYTHING: ${{ inputs.purge_everything }}
        run: |
          set -euo pipefail

          if [ -z "${CF_API_TOKEN}" ] || [ -z "${CF_ZONE_ID}" ]; then
            echo "::error::Missing secrets. Required: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID"
            exit 1
          fi

          if [ "${PURGE_EVERYTHING}" != "true" ]; then
            echo "::error::Only purge_everything=true is supported in this workflow version."
            exit 1
          fi

          echo "Purging Cloudflare cache for zone: ${CF_ZONE_ID}"
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | tee response.json

          jq -e '.success == true' response.json >/dev/null || (echo "::error::Purge failed" && cat response.json && exit 1)
          echo "✅ Purge success"