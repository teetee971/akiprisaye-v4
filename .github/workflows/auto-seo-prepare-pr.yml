# ────────────────────────────────────────────────────────────────────────────
# 🌿 Auto SEO Prepare PR (Manual, Review-Only Branch)
# ────────────────────────────────────────────────────────────────────────────
#
# PURPOSE: Create a reviewable branch staging ONLY whitelisted SEO files.
#          A human must review and manually merge the PR.
#
# TRIGGERS:
#   - Manual only (workflow_dispatch) — NEVER on schedule
#
# SAFE GUARANTEES:
#   ✅ Only runs on workflow_dispatch (no automatic trigger)
#   ✅ Only stages files from the WHITELIST
#   ✅ Creates a branch auto-seo/YYYY-MM-DD — never touches main
#   ✅ Never auto-merges
#   ✅ Never deploys
#   ✅ Dry-run mode available (push_branch: false)
#
# WHITELIST (the only files this workflow will ever stage):
#   - frontend/src/data/seo/generated-pages.json
#   - frontend/src/data/seo/generated-content.json
#   - frontend/src/data/seo/internal-links-map.json
#   - seo-pages-manifest.json
#   - frontend/public/sitemap.xml
#
# INPUTS:
#   push_branch (bool, default: false) — actually push the branch
# ────────────────────────────────────────────────────────────────────────────

name: 🌿 Auto SEO Prepare PR

on:
  workflow_dispatch:
    inputs:
      push_branch:
        description: 'Push branch to remote (false = dry-run only)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write    # needed only for git push when push_branch=true

concurrency:
  group: auto-seo-prepare-pr
  cancel-in-progress: true

# ── WHITELIST ─────────────────────────────────────────────────────────────────
# These are the only paths this workflow will ever commit.
# No other files will be staged, even if they were modified.
env:
  WHITELIST: >-
    frontend/src/data/seo/generated-pages.json
    frontend/src/data/seo/generated-content.json
    frontend/src/data/seo/internal-links-map.json
    seo-pages-manifest.json
    frontend/public/sitemap.xml

jobs:
  prepare-pr:
    name: 🌿 Prepare SEO Branch
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for branch creation

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install root dependencies
        run: npm install --ignore-scripts 2>/dev/null || true

      # ── Generate all SEO assets ────────────────────────────────────────────
      - name: Generate SEO assets
        run: npm run seo:generate

      - name: Generate sitemap
        run: npm run seo:sitemap

      # ── Validate before staging anything ──────────────────────────────────
      - name: Validate SEO artifacts (fail-fast)
        run: npm run seo:validate

      # ── Create branch and stage ONLY whitelisted files ─────────────────────
      - name: Create SEO branch and stage whitelisted files
        id: branch
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          BRANCH="auto-seo/${DATE}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch from current HEAD
          git checkout -b "$BRANCH"

          # Stage ONLY whitelisted files that actually exist and have changes
          STAGED=0
          for f in $WHITELIST; do
            if [ -f "$f" ]; then
              git add -- "$f"
              STAGED=$((STAGED + 1))
              echo "  staged: $f"
            else
              echo "  skip (not found): $f"
            fi
          done

          echo "staged_count=${STAGED}" >> "$GITHUB_OUTPUT"

          # Commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No whitelisted files changed — nothing to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            STAGED_FILES=$(git diff --cached --name-only 2>/dev/null | tr '\n' ' ')
            git commit \
              -m "auto-seo: weekly SEO update — ${DATE}" \
              -m "Generated by: ${{ github.workflow }} #${{ github.run_number }} | Actor: ${{ github.actor }} | Files: ${STAGED_FILES}" \
              -m "REVIEW REQUIRED before merging. This commit was created by automation and must be human-approved."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "✅ Commit created on branch: ${BRANCH}"
          fi

      # ── Dry-run: show diff without pushing ────────────────────────────────
      - name: Show diff (dry-run summary)
        if: steps.branch.outputs.has_changes == 'true'
        run: |
          echo "=== Changes staged on branch ${{ steps.branch.outputs.branch }} ==="
          git show --stat HEAD || true

      # ── Push branch (only when push_branch=true) ──────────────────────────
      - name: Push branch
        if: >
          steps.branch.outputs.has_changes == 'true' &&
          inputs.push_branch == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.branch }}"
          echo "✅ Branch pushed: ${{ steps.branch.outputs.branch }}"
          echo "➡️  Create a PR manually: https://github.com/${{ github.repository }}/compare/${{ steps.branch.outputs.branch }}"

      # ── Upload review artifacts ────────────────────────────────────────────
      - name: Upload staged files as artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: auto-seo-pr-${{ github.run_number }}
          retention-days: 14
          path: |
            frontend/src/data/seo/generated-pages.json
            frontend/src/data/seo/generated-content.json
            frontend/src/data/seo/internal-links-map.json
            seo-pages-manifest.json
            frontend/public/sitemap.xml
            scripts/auto-seo/output/AUTO_SEO_PLAN.md

      - name: Summary
        if: always()
        run: |
          echo "## 🌿 Auto SEO Prepare PR — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.branch.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Has changes | ${{ steps.branch.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files staged | ${{ steps.branch.outputs.staged_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch pushed | ${{ inputs.push_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Whitelist" >> $GITHUB_STEP_SUMMARY
          echo "Only these files are ever staged by this workflow:" >> $GITHUB_STEP_SUMMARY
          for f in $WHITELIST; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **A human must review and manually merge the PR. No auto-merge.**" >> $GITHUB_STEP_SUMMARY
          echo "🔒 **deploy-pages.yml only triggers on push to main — this branch cannot deploy.**" >> $GITHUB_STEP_SUMMARY
