name: Platform B2B OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  build-b2b:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run B2B export script
        run: node scripts/build-b2b-exports.mjs

      - name: Validate outputs
        run: |
          for f in data/output/b2b-insights.json data/output/b2b-retailer-ranking.json data/output/b2b-category-pressure.json data/output/b2b-offers.json; do
            if [ ! -f "$f" ]; then
              echo "Missing output: $f"
              exit 1
            fi
          done
          echo "All B2B outputs present"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: platform-b2b-outputs
          path: |
            data/output/b2b-insights.json
            data/output/b2b-retailer-ranking.json
            data/output/b2b-category-pressure.json
            data/output/b2b-offers.json
          retention-days: 7
