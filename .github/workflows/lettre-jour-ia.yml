# ──────────────────────────────────────────────────────────────────────────────
# ☀️ Briefing Journalier IA — Actualité quotidienne des territoires ultramarins
# ──────────────────────────────────────────────────────────────────────────────
#
# Déclenchement :
#   - Automatique : chaque jour à 7h00 UTC (8h heure de Paris en hiver,
#     9h en été). Le briefing couvre l'actualité du jour.
#   - Manuel      : via "Run workflow" depuis l'onglet Actions de GitHub.
#
# Secrets GitHub à configurer (Settings > Secrets and variables > Actions) :
#
#   OPENAI_API_KEY
#     → Clé API OpenAI.
#     → Créer sur : https://platform.openai.com/api-keys
#     → Modèle utilisé : gpt-4o-mini (~0,01 € par génération)
#
#   FIREBASE_SERVICE_ACCOUNT
#     → Credentials du compte de service Firebase Admin, en JSON brut
#       ou encodés en base64.
#     → Générer sur : Firebase Console > Paramètres du projet >
#       Comptes de service > Générer une nouvelle clé privée
#     → Encoder en base64 (Linux/macOS) :
#         base64 -w 0 service-account.json
#     → Assigner le rôle "Cloud Datastore User" au compte de service
#       pour autoriser les écritures Firestore.
#
# Règles Firestore à configurer (pour lecture publique) :
#   match /lettre_jour_ia/{dayId} {
#     allow read: if true;
#     allow write: if false;   // écriture uniquement via Admin SDK
#   }
# ──────────────────────────────────────────────────────────────────────────────

name: ☀️ Briefing Journalier IA — DOM/COM

on:
  schedule:
    - cron: '0 7 * * *'   # Chaque jour à 7h UTC
  workflow_dispatch:        # Déclenchement manuel possible
    inputs:
      dry_run:
        description: 'Simulation (affiche le résultat sans écrire dans Firestore)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  generate-briefing:
    name: Générer le briefing journalier
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/lettre-jour/package.json

      - name: 📦 Installer les dépendances
        working-directory: scripts/lettre-jour
        run: npm install

      - name: ☀️ Générer le briefing journalier
        working-directory: scripts/lettre-jour
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️  OPENAI_API_KEY absent — génération du briefing ignorée (secret manquant)"
            exit 0
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node generate.js --dry-run
          else
            node generate.js
          fi

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toLocaleString('fr-FR', { timeZone: 'America/Guadeloupe' });
            console.log(`⚠️ Échec de la génération du Briefing Journalier IA le ${date}`);
            // Pour envoyer une notification Slack/Discord, ajouter ici le webhook
