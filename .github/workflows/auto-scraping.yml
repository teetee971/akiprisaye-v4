# ──────────────────────────────────────────────────────────────────────────────
# 🤖 Scraping Automatique Multi-Sources — Prix DOM-TOM
# ──────────────────────────────────────────────────────────────────────────────
#
# Ce workflow orchestre le scraping automatique de TOUTES les sources de prix :
#
#   ⛽ Carburants  → prix-carburants.gouv.fr (XML officiel gouvernemental)
#   🥦 Alimentaire → Open Prices / Open Food Facts (ODbL + CC-BY-SA)
#   📋 BQP         → data.gouv.fr (DGCCRF / Préfectures DOM)
#   📡 Services    → ARCEP, CRE, INSEE BDM (Licence Ouverte v2.0)
#
# Déclenchement :
#   - Automatique : chaque jour à 6h00 UTC (7h Paris hiver, 8h Paris été)
#   - Manuel      : "Run workflow" depuis l'onglet Actions
#   - Post-deploy : après chaque déploiement réussi (workflow_run)
#
# Secrets GitHub requis :
#   FIREBASE_SERVICE_ACCOUNT — Credentials Admin SDK Firebase (base64 ou JSON)
#   OPENAI_API_KEY           — Pour le rapport IA post-scraping (optionnel)
#
# Résultat :
#   - Fichiers JSON mis à jour et commités dans main
#   - Firestore : scraping_sessions/{date} + price_shocks/{date}
#   - Step Summary GitHub Actions avec rapport IA
# ──────────────────────────────────────────────────────────────────────────────

name: 🤖 Scraping Automatique — Prix DOM-TOM

on:
  schedule:
    - cron: '0 6 * * *'   # Chaque jour à 6h UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source à scraper (all / fuel / food / bqp / services)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'fuel', 'food', 'bqp', 'services']
      dry_run:
        description: 'Simulation (pas d''écriture)'
        required: false
        default: 'false'
        type: boolean
  workflow_run:
    workflows: ['Deploy to GitHub Pages', 'Deploy to Cloudflare Pages']
    types: [completed]

permissions:
  contents: write   # Pour commiter les JSON mis à jour
  issues: write     # Pour créer des alertes si choc grave
  actions: read
  pull-requests: write  # Pour créer la PR de mise à jour des données

concurrency:
  group: scraping-auto
  cancel-in-progress: false   # Ne jamais annuler un scraping en cours

jobs:
  scrape:
    name: 🔄 Scraping multi-sources
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Ne pas exécuter si c'est un déploiement qui a échoué
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔍 Vérifier secret Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "✅ FIREBASE_SERVICE_ACCOUNT présent — Firestore activé"
          else
            echo "⚠️  FIREBASE_SERVICE_ACCOUNT absent — le scraping continuera sans écriture Firestore"
          fi

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-scraper/package-lock.json

      - name: 📦 Installer dépendances scraper
        working-directory: scripts/auto-scraper
        run: npm ci

      - name: 🤖 Scraping automatique
        working-directory: scripts/auto-scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          SOURCE="${{ inputs.source || 'all' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scrape.mjs --source "$SOURCE" --dry-run
          else
            node scrape.mjs --source "$SOURCE"
          fi

      - name: 🛒 Scan panier de base (produits essentiels DOM-TOM)
        if: ${{ inputs.dry_run != 'true' && (inputs.source == 'all' || inputs.source == '') }}
        working-directory: scripts/auto-scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          echo "📦 Scan prix produits de première nécessité…"
          if node scrape-product.mjs --panier --territory all --output both; then
            echo "✅ Scan panier terminé"
          else
            EXIT_CODE=$?
            echo "⚠️  Scan panier partiel (code $EXIT_CODE) — données Open Prices limitées ou API indisponible"
            # Non-fatal : ne pas échouer le workflow pour un scan panier partiel
            exit 0
          fi

      - name: 💾 Créer PR avec données mises à jour
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "akiprisaye-bot[scraper]"
          git config user.email "bot-scraper@akiprisaye.fr"

          # Vérifier s'il y a des changements dans les fichiers de données
          # git status --porcelain détecte aussi les nouveaux fichiers non suivis (ex: product-scan-*.json)
          if [ -z "$(git status --porcelain -- frontend/public/data/)" ]; then
            echo "ℹ️  Aucune modification de données — pas de commit"
          else
            CHANGED=$(git status --porcelain -- frontend/public/data/ | awk '{print $2}' | tr '\n' ' ')
            echo "📝 Fichiers modifiés : $CHANGED"

            git add frontend/public/data/

            git commit \
              -m "🤖 [auto] Mise à jour données prix — $(date -u '+%Y-%m-%d %H:%M UTC')" \
              -m "Sources scrapées : prix-carburants.gouv.fr, Open Prices, data.gouv.fr BQP, ARCEP/CRE/INSEE" \
              -m "Déclencheur : ${{ github.event_name }}" \
              -m "[skip ci]"
            git push || echo "⚠️  Push vers main rejeté (règle de protection de branche) — données générées localement, disponibles en artifacts CI"
            echo "✅ Données committées"
          fi

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toLocaleString('fr-FR', { timeZone: 'America/Guadeloupe' });
            const todayIso = new Date().toISOString().slice(0,10);
            core.warning(`⚠️ Échec du scraping automatique — ${date}`);
            // Fermer les anciennes issues de scraping (plus de MAX_AGE_DAYS jours)
            const MAX_AGE_DAYS = 3;
            const cutoff = new Date(Date.now() - MAX_AGE_DAYS * 24 * 60 * 60 * 1000);
            const cutoffDate = cutoff.toISOString().slice(0, 10);
            const oldIssues = await github.paginate(
              github.rest.search.issuesAndPullRequests,
              {
                q: `[AUTO] Échec scraping in:title repo:${context.repo.owner}/${context.repo.repo} is:open is:issue label:automatique created:<${cutoffDate}`,
                per_page: 100
              }
            );
            for (const issue of oldIssues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
              core.info(`Fermé issue #${issue.number} (${issue.title})`);
            }
            // Éviter les doublons : vérifier si une issue est déjà ouverte pour aujourd'hui
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `[AUTO] Échec scraping données prix — ${todayIso} in:title repo:${context.repo.owner}/${context.repo.repo} is:open is:issue label:scraping label:automatique label:alerte`
            });

            // Créer la nouvelle issue
            const newIssue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [AUTO] Échec scraping données prix — ${todayIso}`,
              body: `Le scraping automatique a échoué.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Actions à mener :**\n- Vérifier les logs du workflow\n- Vérifier la disponibilité des sources\n- Relancer manuellement si nécessaire`,
              labels: ['scraping', 'automatique', 'alerte']
            });

            // Fermer les anciennes après création de la nouvelle
            for (const issue of oldIssues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Fermée automatiquement — remplacée par #${newIssue.data.number} (${todayIso})`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }
            core.info(`✅ Issue créée: #${newIssue.data.number} — ${oldIssues.data.length} anciennes fermées`);
