# ──────────────────────────────────────────────────────────────────────────────
# 🤖 Scraping Automatique Multi-Sources — Prix DOM-TOM
# ──────────────────────────────────────────────────────────────────────────────
#
# Ce workflow orchestre le scraping automatique de TOUTES les sources de prix :
#
#   ⛽ Carburants  → prix-carburants.gouv.fr (XML officiel gouvernemental)
#   🥦 Alimentaire → Open Prices / Open Food Facts (ODbL + CC-BY-SA)
#   📋 BQP         → data.gouv.fr (DGCCRF / Préfectures DOM)
#   📡 Services    → ARCEP, CRE, INSEE BDM (Licence Ouverte v2.0)
#
# Déclenchement :
#   - Automatique : chaque jour à 6h00 UTC (7h Paris hiver, 8h Paris été)
#   - Manuel      : "Run workflow" depuis l'onglet Actions
#   - Post-deploy : après chaque déploiement réussi (workflow_run)
#
# Secrets GitHub requis :
#   FIREBASE_SERVICE_ACCOUNT — Credentials Admin SDK Firebase (base64 ou JSON)
#   OPENAI_API_KEY           — Pour le rapport IA post-scraping (optionnel)
#
# Résultat :
#   - Fichiers JSON mis à jour et commités dans main
#   - Firestore : scraping_sessions/{date} + price_shocks/{date}
#   - Step Summary GitHub Actions avec rapport IA
# ──────────────────────────────────────────────────────────────────────────────

name: 🤖 Scraping Automatique — Prix DOM-TOM

on:
  schedule:
    - cron: '0 6 * * *'   # Chaque jour à 6h UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source à scraper (all / fuel / food / bqp / services)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'fuel', 'food', 'bqp', 'services']
      dry_run:
        description: 'Simulation (pas d''écriture)'
        required: false
        default: 'false'
        type: boolean
  workflow_run:
    workflows: ['Deploy to GitHub Pages', 'Deploy to Cloudflare Pages']
    types: [completed]

permissions:
  contents: write   # Pour commiter les JSON mis à jour
  issues: write     # Pour créer des alertes si choc grave
  actions: read
  pull-requests: write  # Pour créer la PR de mise à jour des données

concurrency:
  group: scraping-auto
  cancel-in-progress: false   # Ne jamais annuler un scraping en cours

jobs:
  scrape:
    name: 🔄 Scraping multi-sources
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Ne pas exécuter si c'est un déploiement qui a échoué
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔍 Vérifier secret Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ]; then
            echo "✅ FIREBASE_SERVICE_ACCOUNT présent — Firestore activé"
          else
            echo "⚠️  FIREBASE_SERVICE_ACCOUNT absent — le scraping continuera sans écriture Firestore"
          fi

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: scripts/auto-scraper/package-lock.json

      - name: 📦 Installer dépendances scraper
        working-directory: scripts/auto-scraper
        run: npm ci

      - name: 🤖 Scraping automatique
        working-directory: scripts/auto-scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          SOURCE="${{ inputs.source || 'all' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scrape.mjs --source "$SOURCE" --dry-run
          else
            node scrape.mjs --source "$SOURCE"
          fi

      - name: 🛒 Scan panier de base (produits essentiels DOM-TOM)
        if: ${{ inputs.dry_run != 'true' && (inputs.source == 'all' || inputs.source == '') }}
        working-directory: scripts/auto-scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          echo "📦 Scan prix produits de première nécessité…"
          if node scrape-product.mjs --panier --territory all --output both; then
            echo "✅ Scan panier terminé"
          else
            EXIT_CODE=$?
            echo "⚠️  Scan panier partiel (code $EXIT_CODE) — données Open Prices limitées ou API indisponible"
            # Non-fatal : ne pas échouer le workflow pour un scan panier partiel
            exit 0
          fi

      - name: 💾 Créer PR avec données mises à jour
        if: ${{ inputs.dry_run != 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: auto-scraper-data
          base: main
          commit-message: "🤖 [auto] Mise à jour données prix — [skip ci]"
          add-paths: frontend/public/data/
          title: "🤖 [auto] Mise à jour données prix DOM-TOM"
          body: |
            Mise à jour automatique des données prix par le scraper.

            **Sources :** prix-carburants.gouv.fr, Open Prices, data.gouv.fr BQP, ARCEP/CRE/INSEE
            **Déclencheur :** ${{ github.event_name }}

      - name: 📢 Notification en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toLocaleString('fr-FR', { timeZone: 'America/Guadeloupe' });
            const todayIso = new Date().toISOString().slice(0,10);
            core.warning(`⚠️ Échec du scraping automatique — ${date}`);
            // Éviter les doublons : vérifier si une issue est déjà ouverte pour aujourd'hui
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `[AUTO] Échec scraping données prix — ${todayIso} in:title repo:${context.repo.owner}/${context.repo.repo} is:open is:issue label:scraping label:automatique label:alerte`
            });
            if (existing.data.total_count > 0) {
              core.info(`ℹ️ Issue scraping déjà ouverte pour le ${todayIso} — pas de doublon créé`);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [AUTO] Échec scraping données prix — ${todayIso}`,
              body: `Le scraping automatique a échoué.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Actions à mener :**\n- Vérifier les sources de données\n- Contrôler les secrets GitHub\n- Relancer manuellement si nécessaire`,
              labels: ['scraping', 'automatique', 'alerte']
            });
