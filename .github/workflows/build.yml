name: Generate ZIP
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci --include=dev
          npm run build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-v4-dist
          path: frontend/dist/
