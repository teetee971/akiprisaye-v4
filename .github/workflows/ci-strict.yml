name: CI Strict (Zero Warning)

on:
  pull_request:
    branches: ['main', 'production']
  push:
    branches: ['main', 'production']

jobs:
  ci-strict:
    name: Strict CI - Zero Warnings Allowed
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npm run typecheck:ci
        continue-on-error: false

      - name: ESLint strict check (max-warnings=0)
        run: npm run lint:ci
        continue-on-error: false

      - name: Block new explicit any (diff-based)
        # Guardrail pour éviter l'introduction de nouveaux `any` tant que noImplicitAny est temporairement désactivé.
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi
          git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
          DIFF=$(git diff -U0 "$BASE_SHA"...HEAD -- '*.ts' '*.tsx' | rg -n '^\+[^+].*(:\s*any\b|as\s+any\b|<any>|\bany\[\])' || true)
          if [ -n "$DIFF" ]; then
            echo "❌ New explicit any detected in added lines:"
            echo "$DIFF"
            exit 1
          fi
          echo "✅ No new explicit any detected."

      - name: Build strict (Vite - no warnings allowed)
        run: npm run build:ci
        continue-on-error: false

      - name: Run tests
        run: npm run test:ci
        continue-on-error: false

      - name: Security audit (moderate+)
        run: npm run audit:ci
        continue-on-error: false

      - name: Accessibility testing (axe-core WCAG)
        # Quality gate non bloquant – hardening progressif post-V1 (CI-TECH-DEBT-A11Y-001)
        id: axe
        run: npm run axe:ci 2>&1 | tee axe-report.txt
        continue-on-error: true

      - name: Lighthouse CI (strict quality gates)
        # Quality gate non bloquant – hardening progressif post-V1 (CI-TECH-DEBT-LHCI-001)
        id: lighthouse
        run: npm run lhci
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Extract Lighthouse report URL
        if: always()
        id: lhci-url
        run: |
          if [ -f .lighthouseci/links.json ]; then
            URL=$(cat .lighthouseci/links.json | grep -o 'https://[^"]*' | head -1)
            echo "report_url=$URL" >> $GITHUB_OUTPUT
            echo "📊 Lighthouse Report: $URL"
          else
            echo "report_url=Not available" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with quality report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = '${{ steps.lhci-url.outputs.report_url }}';
            const status = '${{ needs.ci-strict.result }}' === 'success' ? '✅' : '❌';
            const axeStatus = '${{ steps.axe.outcome }}' === 'success' ? '✅' : '⚠️';
            const lhciStatus = '${{ steps.lighthouse.outcome }}' === 'success' ? '✅' : '⚠️';
            const body = `## ${status} CI Strict - Quality Report
            
            ### Checks Performed
            - ${status} TypeScript strict check
            - ${status} ESLint (max-warnings=0)
            - ${status} Build (zero warnings)
            - ${status} Tests
            - ${status} Security audit (npm)
            - ${axeStatus} Accessibility (WCAG 2.1 AA) — Quality gate non bloquant – hardening progressif post-V1
            - ${lhciStatus} Lighthouse CI (Performance, A11y, Best Practices, SEO) — Quality gate non bloquant – hardening progressif post-V1
            
            ### Lighthouse Report
            ${reportUrl !== 'Not available' ? `📊 [View detailed Lighthouse report](${reportUrl})` : 'Report not available'}
            
            ### Quality Standards
            - **Performance** ≥ 85
            - **Accessibility** ≥ 95
            - **Best Practices** ≥ 95
            - **SEO** ≥ 90
            
            ### Performance Budgets
            - Scripts: 350 KB max
            - Images: 500 KB max
            - Total: 1.2 MB max
            
            > Quality gate non bloquant – hardening progressif post-V1
            
            ---
            *Powered by A KI PRI SA YÉ - Transparent quality metrics*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci
          retention-days: 30
      
      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.txt
          retention-days: 30

      - name: Check dist directory
        run: |
          echo "✅ Build artifacts created successfully"
          ls -lh dist/
          echo "✅ Leaflet images copied:"
          ls -lh dist/images/

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: ci-strict
    if: always()
    
    steps:
      - name: Check CI Status
        run: |
          if [ "${{ needs.ci-strict.result }}" == "success" ]; then
            echo "✅ CI STRICT PASSED - Zero warnings detected"
            echo "✅ TypeScript: Clean"
            echo "✅ ESLint: Clean (max-warnings=0)"
            echo "✅ Build: Clean (no warnings)"
            echo "✅ Tests: Passed"
            echo "✅ Security: No vulnerabilities (moderate+)"
            echo "⚠️ Lighthouse CI: Non-blocking quality gates (post-V1 hardening)"
            echo "  - Performance ≥ 85 (warn)"
            echo "  - Accessibility ≥ 95 (warn)"
            echo "  - Best Practices ≥ 95 (warn)"
            echo "  - SEO ≥ 90 (warn)"
            echo "⚠️ Accessibility (axe): Non-blocking quality gate (post-V1 hardening)"
            echo ""
            echo "🎯 Ready for production deployment"
          else
            echo "❌ CI STRICT FAILED - Warnings or errors detected"
            echo ""
            echo "Please fix all issues before merging:"
            echo "  - Check TypeScript errors (npm run typecheck)"
            echo "  - Check ESLint warnings (npm run lint)"
            echo "  - Check build warnings (npm run build)"
            echo "  - Check Lighthouse scores (npm run lhci)"
            exit 1
          fi
