name: CI Strict (Zero Warning)

on:
  pull_request:
    branches: [ "main", "production" ]
  push:
    branches: [ "main", "production" ]

jobs:
  ci-strict:
    name: Strict CI – Zero Warnings Allowed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # -----------------------------
      # STRICT CHECKS (BLOCKING ONLY ON main / production)
      # -----------------------------

      - name: TypeScript strict check
        working-directory: frontend
        run: npm run typecheck:ci
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: ESLint strict check (max-warnings=0)
        working-directory: frontend
        run: npm run lint:ci
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Block new explicit any (diff-based)
        if: github.event_name != 'pull_request' || always()
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE_SHA" ]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
          DIFF=$(git diff -U0 "$BASE_SHA"...HEAD -- '*.ts' '*.tsx' | grep -n '^\+' | grep -n 'any' || true)

          if [ -n "$DIFF" ] && [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "❌ New explicit any detected:"
            echo "$DIFF"
            exit 1
          fi

          echo "✅ No blocking explicit any detected."

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build:ci
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Run tests
        working-directory: frontend
        run: npm run test:ci
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      - name: Security audit (npm)
        working-directory: frontend
        run: npm run audit:ci
        continue-on-error: true

      # -----------------------------
      # NON-BLOCKING QUALITY GATES
      # -----------------------------

      - name: Accessibility testing (axe-core WCAG)
        id: axe
        working-directory: frontend
        run: npm run axe:ci 2>&1 | tee axe-report.txt
        continue-on-error: true

      - name: Lighthouse CI
        id: lhci
        working-directory: frontend
        run: npm run lhci
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Extract Lighthouse report URL
        if: always()
        id: lhci-url
        run: |
          if [ -f frontend/.lighthouseci/links.json ]; then
            URL=$(cat frontend/.lighthouseci/links.json | grep -o 'https://[^"]*' | head -n 1)
            echo "report_url=$URL" >> $GITHUB_OUTPUT
          else
            echo "report_url=Not available" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # PR COMMENT (INFORMATION ONLY)
      # -----------------------------

      - name: Comment PR with quality report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = '${{ steps.lhci-url.outputs.report_url }}';

            const body = `
### 🧪 CI Strict – Quality Report (non bloquant)

**Checks exécutés :**
- TypeScript strict
- ESLint (max-warnings=0)
- Build
- Tests
- Audit sécurité (npm)
- Accessibilité (WCAG 2.1 AA)
- Lighthouse (Performance, A11y, Best Practices, SEO)

**Standards cibles (post-V1) :**
- Performance ≥ 85
- Accessibilité ≥ 95
- Best Practices ≥ 95
- SEO ≥ 90

${reportUrl !== 'Not available' ? `🔍 [Voir le rapport Lighthouse](${reportUrl})` : 'Rapport Lighthouse indisponible'}

ℹ️ *Quality gate non bloquant – hardening progressif.*
`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # -----------------------------
      # ARTIFACTS (DEBUG / AUDIT)
      # -----------------------------

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: frontend/axe-report.txt
          retention-days: 30

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: frontend/.lighthouseci
          retention-days: 30
