# ──────────────────────────────────────────────────────────────────────────────
# 🔥 Test — Compte de service Firebase
# ──────────────────────────────────────────────────────────────────────────────
#
# Vérifie que le secret FIREBASE_SERVICE_ACCOUNT est correctement configuré et
# peut établir une connexion Firestore via Firebase Admin SDK.
#
# Déclenchement :
#   - Manuel uniquement via "Run workflow" depuis l'onglet Actions
#     (désactivé sur push pour réduire la surface d'attaque — le secret ne doit
#      être utilisé qu'à la demande explicite, pas à chaque commit)
#
# Secret requis (Settings > Secrets and variables > Actions) :
#   FIREBASE_SERVICE_ACCOUNT
#     → JSON brut ou encodé en base64 du compte de service Firebase Admin
#     → Générer sur : Firebase Console > Paramètres > Comptes de service
# ──────────────────────────────────────────────────────────────────────────────

name: 🔥 Test — Compte de service Firebase

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-firebase-sa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-service-account:
    name: Vérifier le compte de service Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: 📦 Installer firebase-admin
        run: npm install --no-fund --no-audit

      - name: 🔥 Tester la connexion Firebase (compte de service)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node --input-type=module <<'EOF'
          import admin from 'firebase-admin';

          const raw = process.env.FIREBASE_SERVICE_ACCOUNT ?? '';
          if (!raw) {
            console.error('❌ Secret FIREBASE_SERVICE_ACCOUNT non défini.');
            console.error('   → Configurer dans : Settings > Secrets and variables > Actions');
            process.exit(1);
          }

          let serviceAccount;
          try {
            // Accepte base64 ou JSON brut
            try {
              serviceAccount = JSON.parse(Buffer.from(raw, 'base64').toString('utf-8'));
            } catch {
              serviceAccount = JSON.parse(raw);
            }
          } catch {
            // Do NOT include err.message here — JSON.parse errors can echo back
            // a portion of the raw input string, which would expose the secret
            // in CI logs even though GitHub Actions masks the raw value.
            console.error('❌ Impossible de parser FIREBASE_SERVICE_ACCOUNT.');
            console.error('   → La valeur doit être du JSON valide (brut ou encodé en base64)');
            process.exit(1);
          }

          if (!serviceAccount.project_id || !serviceAccount.client_email || !serviceAccount.private_key) {
            console.error('❌ Compte de service invalide : champs manquants (project_id, client_email, private_key)');
            process.exit(1);
          }

          console.log(`ℹ️  Projet  : ${serviceAccount.project_id}`);
          console.log(`ℹ️  Client  : ${serviceAccount.client_email}`);

          try {
            const app = admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
            // Obtenir un token d'accès valide — confirme que la clé privée est correcte
            // sans nécessiter de permissions Firestore spécifiques.
            const token = await app.options.credential.getAccessToken();
            if (!token?.access_token) throw new Error('Token vide reçu');
            console.log('✅ Compte de service valide — token d\'accès obtenu avec succès.');
          } catch (err) {
            console.error('❌ Échec d\'authentification du compte de service :', err.message);
            process.exit(1);
          }
          EOF
