name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
      - work
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PAGES_PROJECT: akiprisaye-web

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  ci:
    name: CI (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    outputs:
      has_lint: ${{ steps.detect_scripts.outputs.has_lint }}
      has_typecheck: ${{ steps.detect_scripts.outputs.has_typecheck }}
      has_test: ${{ steps.detect_scripts.outputs.has_test }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Detect optional npm scripts
        id: detect_scripts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `has_lint=${Boolean(scripts.lint)}\n`);
          fs.appendFileSync(out, `has_typecheck=${Boolean(scripts.typecheck)}\n`);
          fs.appendFileSync(out, `has_test=${Boolean(scripts.test)}\n`);
          NODE

      - name: Lint (if script exists)
        if: steps.detect_scripts.outputs.has_lint == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Lint skipped
        if: steps.detect_scripts.outputs.has_lint != 'true'
        run: echo "No lint script found in frontend/package.json, skipping."

      - name: Typecheck (if script exists)
        if: steps.detect_scripts.outputs.has_typecheck == 'true'
        working-directory: frontend
        run: npm run typecheck

      - name: Typecheck skipped
        if: steps.detect_scripts.outputs.has_typecheck != 'true'
        run: echo "No typecheck script found in frontend/package.json, skipping."

      - name: Test (if script exists)
        if: steps.detect_scripts.outputs.has_test == 'true'
        working-directory: frontend
        run: npm run test

      - name: Test skipped
        if: steps.detect_scripts.outputs.has_test != 'true'
        run: echo "No test script found in frontend/package.json, skipping."

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify build
        shell: bash
        run: |
          ls -la frontend/dist
          test -f frontend/dist/index.html
          test -f frontend/dist/_redirects
          test ! -f frontend/dist/404.html

      - name: Verify routing files if present
        shell: bash
        run: |
          for file in _redirects _headers _routes.json; do
            target="frontend/dist/$file"
            if [ -f "$target" ]; then
              echo "Found $target"
              echo "----- $target -----"
              cat "$target"
              echo "-------------------"
            else
              echo "$target not present (ok)."
            fi
          done

      - name: Verify version.json
        shell: bash
        run: |
          if [ -f frontend/dist/version.json ]; then
            echo "Found frontend/dist/version.json"
            cat frontend/dist/version.json
          elif [ -f frontend/version.json ]; then
            echo "frontend/dist/version.json missing; found frontend/version.json"
            cat frontend/version.json
          elif [ -f version.json ]; then
            echo "frontend/dist/version.json missing; found version.json at repo root"
            cat version.json
          else
            echo "::warning::No version.json found in frontend/dist, frontend/, or repository root."
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist
          retention-days: 7

      - name: Report summary
        shell: bash
        run: |
          {
            echo "## CI summary"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- lint script: \`${{ steps.detect_scripts.outputs.has_lint }}\`"
            echo "- typecheck script: \`${{ steps.detect_scripts.outputs.has_typecheck }}\`"
            echo "- test script: \`${{ steps.detect_scripts.outputs.has_test }}\`"
            if [ -f frontend/dist/index.html ]; then
              echo "- dist/index.html: ✅"
            else
              echo "- dist/index.html: ❌"
            fi
            if [ -f frontend/dist/_redirects ]; then
              echo "- dist/_redirects: ✅"
            else
              echo "- dist/_redirects: ❌"
            fi
            if [ ! -f frontend/dist/404.html ]; then
              echo "- dist/404.html absent: ✅"
            else
              echo "- dist/404.html absent: ❌"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_preview:
    name: Deploy preview (PR)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy_preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.PAGES_PROJECT }}
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Log preview URL
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy_preview.outputs.url }}
        run: |
          CACHE_BUSTER="$(date -u +%Y%m%d%H%M)"
          MOBILE_URL="${DEPLOY_URL}?v=${CACHE_BUSTER}"

          version_payload="not found"
          if [ -f frontend/dist/version.json ]; then
            version_payload="$(cat frontend/dist/version.json)"
          fi

          index_status="❌"
          [ -f frontend/dist/index.html ] && index_status="✅"
          page404_status="✅"
          [ -f frontend/dist/404.html ] && page404_status="❌"
          redirects_status="❌"
          [ -f frontend/dist/_redirects ] && redirects_status="✅"
          headers_status="❌"
          [ -f frontend/dist/_headers ] && headers_status="✅"
          routes_status="❌"
          [ -f frontend/dist/_routes.json ] && routes_status="✅"

          echo "Preview deployment URL: ${DEPLOY_URL}"
          {
            echo "## Release/Deploy summary"
            echo "- Preview URL: ${DEPLOY_URL:-not available}"
            echo "- Production URL: not available in preview job"
            echo "- Mobile URL (cache-buster): ${MOBILE_URL:-not available}"
            echo "- Cache-buster version: `${CACHE_BUSTER}`"
            echo ""
            echo "### version.json"
            echo "```json"
            echo "${version_payload}"
            echo "```"
            echo ""
            echo "### Dist checklist"
            echo "- index.html: ${index_status}"
            echo "- 404.html absent: ${page404_status}"
            echo "- _redirects: ${redirects_status}"
            echo "- _headers: ${headers_status}"
            echo "- _routes.json: ${routes_status}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke routes (preview)
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy_preview.outputs.url }}
        run: |
          {
            echo ""
            echo "### Smoke routes"
            if [ -z "${DEPLOY_URL}" ]; then
              echo "- ⚠️ DEPLOY_URL unavailable, skipping smoke checks."
            else
              for route in / /comparateur /scanner-ean; do
                http_code="$(curl -sS -o /dev/null -w "%{http_code}" "${DEPLOY_URL}${route}" || echo "curl_error")"
                if [ "${http_code}" = "curl_error" ]; then
                  echo "- ${DEPLOY_URL}${route} → ⚠️ curl error"
                else
                  echo "- ${DEPLOY_URL}${route} → HTTP ${http_code}"
                fi
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        if: github.event.pull_request.number != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy_preview.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL || 'URL not returned by action';
            const body = `🚀 Cloudflare Pages preview ready:\n\n${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  deploy_production:
    name: Deploy production (main)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist

      - name: Deploy to Cloudflare Pages (Production)
        id: deploy_production
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.PAGES_PROJECT }}
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Log production URL
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy_production.outputs.url }}
        run: |
          CACHE_BUSTER="$(date -u +%Y%m%d%H%M)"
          MOBILE_URL="${DEPLOY_URL}?v=${CACHE_BUSTER}"

          version_payload="not found"
          if [ -f frontend/dist/version.json ]; then
            version_payload="$(cat frontend/dist/version.json)"
          fi

          index_status="❌"
          [ -f frontend/dist/index.html ] && index_status="✅"
          page404_status="✅"
          [ -f frontend/dist/404.html ] && page404_status="❌"
          redirects_status="❌"
          [ -f frontend/dist/_redirects ] && redirects_status="✅"
          headers_status="❌"
          [ -f frontend/dist/_headers ] && headers_status="✅"
          routes_status="❌"
          [ -f frontend/dist/_routes.json ] && routes_status="✅"

          echo "Production deployment URL: ${DEPLOY_URL}"
          {
            echo "## Release/Deploy summary"
            echo "- Preview URL: not available in production job"
            echo "- Production URL: ${DEPLOY_URL:-not available}"
            echo "- Mobile URL (cache-buster): ${MOBILE_URL:-not available}"
            echo "- Cache-buster version: `${CACHE_BUSTER}`"
            echo ""
            echo "### version.json"
            echo "```json"
            echo "${version_payload}"
            echo "```"
            echo ""
            echo "### Dist checklist"
            echo "- index.html: ${index_status}"
            echo "- 404.html absent: ${page404_status}"
            echo "- _redirects: ${redirects_status}"
            echo "- _headers: ${headers_status}"
            echo "- _routes.json: ${routes_status}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke routes (production)
        continue-on-error: true
        shell: bash
        env:
          DEPLOY_URL: ${{ steps.deploy_production.outputs.url }}
        run: |
          {
            echo ""
            echo "### Smoke routes"
            if [ -z "${DEPLOY_URL}" ]; then
              echo "- ⚠️ DEPLOY_URL unavailable, skipping smoke checks."
            else
              for route in / /comparateur /scanner-ean; do
                http_code="$(curl -sS -o /dev/null -w "%{http_code}" "${DEPLOY_URL}${route}" || echo "curl_error")"
                if [ "${http_code}" = "curl_error" ]; then
                  echo "- ${DEPLOY_URL}${route} → ⚠️ curl error"
                else
                  echo "- ${DEPLOY_URL}${route} → HTTP ${http_code}"
                fi
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
