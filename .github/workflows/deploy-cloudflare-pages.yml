name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, "feat/**", "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Fallback utilisé uniquement si l'URL de déploiement n'est pas encore dispo.
  DEFAULT_PREVIEW_URL: https://akiprisaye-web.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment_url: ${{ steps.deployment.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate Firebase API key secret (fail-fast before build)
        working-directory: frontend
        run: |
          WRONG_PART_A="AIzaSyDf_mB8z"
          WRONG_PART_B="MWHFwoFhVLyThuKWMTmhB7uSZY"
          WRONG_KEY="${WRONG_PART_A}${WRONG_PART_B}"
          KEY="${VITE_FIREBASE_API_KEY:-}"
          if [ "$KEY" = "$WRONG_KEY" ]; then
            echo "❌ VITE_FIREBASE_API_KEY secret contient l'ancienne mauvaise clé Firebase."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "ℹ️ VITE_FIREBASE_API_KEY non défini — fallback firebase.ts sera utilisé."
          else
            echo "✅ VITE_FIREBASE_API_KEY présent et valide."
          fi
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: akiprisaye-web
          directory: frontend/dist

  validate:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SITE_URL: ${{ needs.deploy.outputs.deployment_url || env.DEFAULT_PREVIEW_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Wait for propagation
        run: sleep 30

      - name: Validation round 1/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 2
        run: sleep 20

      - name: Validation round 2/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 3
        run: sleep 20

      - name: Validation round 3/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Final proof — 3/3 validations passed ✅
        run: |
          echo "🏆 PREUVE FINALE — DÉPLOIEMENT 100% VALIDÉ"
          echo "✅ Round 1/3 : RÉUSSI"
          echo "✅ Round 2/3 : RÉUSSI"
          echo "✅ Round 3/3 : RÉUSSI"
          echo "🚀 Statut : 100% VERT"

  lighthouse:
    needs: [deploy, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEPLOY_URL: ${{ needs.deploy.outputs.deployment_url || env.DEFAULT_PREVIEW_URL }}
      LHCI_URL: ${{ needs.deploy.outputs.deployment_url || env.DEFAULT_PREVIEW_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Prepare Lighthouse config
        run: node scripts/prepare-lighthouse-config.mjs
        env:
          LHCI_URL: ${{ needs.deploy.outputs.deployment_url || env.DEFAULT_PREVIEW_URL }}

      - name: Run Lighthouse CI (non-blocking)
        run: |
          npx --yes @lhci/cli autorun || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Lighthouse scores baseline
        run: node scripts/lighthouse-guard.mjs --write

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-cloudflare-reports
          path: .lighthouseci
          if-no-files-found: warn

      - name: Upload Lighthouse scores
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-scores-cloudflare
          path: lighthouse-scores.json
          retention-days: 90
          if-no-files-found: warn
