# .github/workflows/deploy-cloudflare-pages.yml
name: Deploy Cloudflare Pages (manual-only CI)

on:
  workflow_dispatch:

concurrency:
  group: manual-pages-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PAGES_PROJECT: akiprisaye-web

permissions:
  contents: read

jobs:
  ci:
    name: Manual CI (lint/typecheck/test/build)
    runs-on: ubuntu-latest

    outputs:
      has_lint: ${{ steps.detect_scripts.outputs.has_lint }}
      has_typecheck: ${{ steps.detect_scripts.outputs.has_typecheck }}
      has_test: ${{ steps.detect_scripts.outputs.has_test }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Detect optional npm scripts
        id: detect_scripts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('frontend/package.json', 'utf8'));
          const scripts = pkg.scripts || {};
          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, `has_lint=${Boolean(scripts.lint)}\n`);
          fs.appendFileSync(out, `has_typecheck=${Boolean(scripts.typecheck)}\n`);
          fs.appendFileSync(out, `has_test=${Boolean(scripts.test)}\n`);
          NODE

      - name: Lint (if script exists)
        if: steps.detect_scripts.outputs.has_lint == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Typecheck (if script exists)
        if: steps.detect_scripts.outputs.has_typecheck == 'true'
        working-directory: frontend
        run: npm run typecheck

      - name: Test (if script exists)
        if: steps.detect_scripts.outputs.has_test == 'true'
        working-directory: frontend
        run: npm run test

      - name: Inject build id
        run: echo "VITE_APP_BUILD_ID=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify build
        shell: bash
        run: |
          ls -la frontend/dist
          test -f frontend/dist/index.html
          test -f frontend/dist/_redirects
          test ! -f frontend/dist/404.html

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist
          retention-days: 7

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Manual CI summary (no deploy)"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- lint: \`${{ steps.detect_scripts.outputs.has_lint }}\`"
            echo "- typecheck: \`${{ steps.detect_scripts.outputs.has_typecheck }}\`"
            echo "- test: \`${{ steps.detect_scripts.outputs.has_test }}\`"
            echo ""
            echo "**This workflow does not deploy.**"
          } >> "$GITHUB_STEP_SUMMARY"