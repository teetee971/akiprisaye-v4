name: Deploy Cloudflare Pages (Wrangler CI)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PAGES_PROJECT: akiprisaye-web

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: CI (install, build, verify)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Inject build id
        run: echo "VITE_APP_BUILD_ID=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Verify build
        shell: bash
        run: |
          set -euo pipefail
          ls -la frontend/dist
          test -f frontend/dist/index.html
          # Ces fichiers peuvent exister ou non. On ne force pas.
          for file in _redirects _headers _routes.json; do
            target="frontend/dist/$file"
            if [ -f "$target" ]; then
              echo "Found $target"
              echo "----- $target -----"
              cat "$target"
              echo "-------------------"
            else
              echo "$target not present (ok)."
            fi
          done

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist
          retention-days: 7

  deploy_preview:
    name: Deploy preview (Wrangler) - PR
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy with Wrangler (Preview)
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler --version
          # Preview sur la branche PR (utile pour inspection)
          BRANCH="pr-${{ github.event.pull_request.number }}"
          npx wrangler pages deploy dist \
            --project-name "${{ env.PAGES_PROJECT }}" \
            --branch "$BRANCH"

      - name: Summary (Preview)
        shell: bash
        run: |
          {
            echo "## Deploy Preview (Wrangler)"
            echo "- Project: \`${{ env.PAGES_PROJECT }}\`"
            echo "- Branch: \`pr-${{ github.event.pull_request.number }}\`"
            echo "- Note: Wrangler affiche l'URL dans les logs du step de déploiement."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_production:
    name: Deploy production (Wrangler) - main
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: frontend/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy with Wrangler (Production)
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler --version
          npx wrangler pages deploy dist \
            --project-name "${{ env.PAGES_PROJECT }}" \
            --branch main

      - name: Post-deploy smoke (Production)
        shell: bash
        run: |
          set -euo pipefail
          # Domaine prod standard Pages
          BASE="https://akiprisaye-web.pages.dev"
          echo "Checking $BASE ..."
          curl -sS -o /dev/null -w "GET / => HTTP %{http_code}\n" "$BASE/"

          # Vérifie tes routes critiques (adapte si besoin)
          for route in "/" "/comparateur" "/scanner-ean"; do
            code="$(curl -sS -o /dev/null -w "%{http_code}" "$BASE$route")"
            echo "GET $route => HTTP $code"
          done

          # Vérifie que l'icône est servie en image/png (c'est ton problème actuel)
          ctype="$(curl -sSI "$BASE/icon-192.png" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}' | head -n1)"
          echo "icon-192.png content-type: $ctype"
          if ! echo "$ctype" | grep -q "image/png"; then
            echo "::error::icon-192.png is not served as image/png (got: $ctype)"
            exit 1
          fi

      - name: Summary (Production)
        shell: bash
        run: |
          {
            echo "## Deploy Production (Wrangler)"
            echo "- Project: \`${{ env.PAGES_PROJECT }}\`"
            echo "- Branch: \`main\`"
            echo "- URL: \`https://akiprisaye-web.pages.dev\`"
          } >> "$GITHUB_STEP_SUMMARY"
