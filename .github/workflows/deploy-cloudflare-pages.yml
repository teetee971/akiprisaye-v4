name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Stable production URL used as fallback when wrangler-action does not return a preview URL.
  # Override this at the repo/environment level if you run a separate staging project.
  DEFAULT_PREVIEW_URL: 'https://akiprisaye-web.pages.dev'

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  check-credentials:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check Cloudflare credentials
        id: check
        run: |
          # A valid Cloudflare Account ID is a 32-character hex string.
          OK=true
          if [ -z "$CF_API_TOKEN" ]; then
            echo "⚠️  CLOUDFLARE_API_TOKEN secret is not set."
            OK=false
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "⚠️  CLOUDFLARE_ACCOUNT_ID secret is not set."
            OK=false
          elif ! echo "$CF_ACCOUNT_ID" | grep -qE '^[0-9a-fA-F]{32}$'; then
            echo "⚠️  CLOUDFLARE_ACCOUNT_ID does not match the expected 32-character hex format."
            echo "    Current length: $(echo -n "$CF_ACCOUNT_ID" | wc -c) chars."
            OK=false
          fi
          if [ "$OK" = "false" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "    ➡ Update CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets to enable Cloudflare Pages deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ Cloudflare credentials look valid – proceeding with deployment."
          fi
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy:
    needs: check-credentials
    if: needs.check-credentials.outputs.configured == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    outputs:
      deployment_url: ${{ steps.cloudflare_deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Validate Firebase API key secret (fail-fast before build)
        run: |
          # Key assembled from parts at runtime so no single literal appears in source
          WRONG_PART_A="AIzaSyDf_mB8z"
          WRONG_PART_B="MWHFwoFhVLyThuKWMTmhB7uSZY"
          WRONG_KEY="${WRONG_PART_A}${WRONG_PART_B}"
          KEY="${VITE_FIREBASE_API_KEY:-}"
          if [ "$KEY" = "$WRONG_KEY" ]; then
            echo "❌ VITE_FIREBASE_API_KEY secret contient l'ANCIENNE mauvaise clé Firebase."
            echo "   → Corrigez le secret VITE_FIREBASE_API_KEY dans les paramètres du dépôt."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "ℹ️  VITE_FIREBASE_API_KEY non défini — le build utilisera le fallback correct dans firebase.ts."
          else
            echo "✅ VITE_FIREBASE_API_KEY présent et distinct de l'ancienne mauvaise clé."
          fi
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          # Deployment proof — injected into the bundle and into public/version.json
          # via the prebuild script (scripts/generate-version.mjs).
          # Without these, version.json would contain branch:"dev" and commit:"unknown",
          # causing verifyVersionJson (validate-deployment.mjs) to fail post-deploy.
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_REF: ${{ github.ref_name }}
          VITE_BUILD_RUN_ID: ${{ github.run_id }}
          # head_commit.timestamp is null on workflow_dispatch — fall back to runner time
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp || '' }}
          VITE_APP_BUILD_ID: ${{ github.sha }}
          # Firebase web config — injected from repository secrets so the correct
          # apiKey is embedded in the production bundle.  If a secret is not set,
          # frontend/src/lib/firebase.ts falls back to the hardcoded values that
          # match frontend/.env.example (kept in sync with GCP / Firebase Console).
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./frontend/dist --project-name=akiprisaye-web --branch=main

  validate:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Resolve deployment URL
        # The 'env' context is not in the allowed list for jobs.<job_id>.env:
        # (GitHub Actions restricts it there; actionlint enforces this rule).
        # Using run: to resolve the URL and export it via GITHUB_ENV is the correct pattern.
        run: |
          URL="${{ needs.deploy.outputs.deployment_url }}"
          if [ -z "$URL" ]; then
            URL="${{ env.DEFAULT_PREVIEW_URL }}"
          fi
          echo "SITE_URL=$URL" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Warm up deployment validation (non-blocking preflight)
        run: |
          for attempt in 1 2 3 4 5 6; do
            echo "🔄 Preflight validation attempt $attempt/6..."
            if node scripts/validate-deployment.mjs "$SITE_URL"; then
              echo "✅ Preflight validation succeeded."
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "⏳ Preview not ready yet, waiting 15s before retry..."
              sleep 15
            fi
          done
          echo "❌ Preflight validation failed after 6 attempts."
          exit 1

      - name: Validation round 1/3
        id: validation_round_1
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 2
        run: |
          echo "⏳ Waiting 30s before round 2..."
          sleep 30

      - name: Validation round 2/3
        id: validation_round_2
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 3
        run: |
          echo "⏳ Waiting 30s before round 3..."
          sleep 30

      - name: Validation round 3/3
        id: validation_round_3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Final proof — 3/3 validations passed ✅
        if: steps.validation_round_1.conclusion == 'success' && steps.validation_round_2.conclusion == 'success' && steps.validation_round_3.conclusion == 'success'
        run: |
          echo ""
          echo "🏆 ============================================"
          echo "🏆  PREUVE FINALE — DÉPLOIEMENT 100% VALIDÉ"
          echo "🏆 ============================================"
          echo "✅ Round 1/3 : RÉUSSI"
          echo "✅ Round 2/3 : RÉUSSI"
          echo "✅ Round 3/3 : RÉUSSI"
          echo ""
          echo "🌐 URL      : $SITE_URL"
          echo "🔖 SHA      : ${{ github.sha }}"
          echo "📅 Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🚀 Statut   : 100% VERT — TOUT OK"

  # ─── Lighthouse (URL réelle Cloudflare) ──────────────────────────────────────
  # Audit Lighthouse sur l'URL de preview réelle après validation du déploiement.
  # Plus représentatif que localhost: CDN réel, headers, compression, HTTP/2.
  # Seuils : performance ≥ 80 (warn), accessibilité ≥ 90 (error), SEO ≥ 80 (warn).
  lighthouse:
    name: Lighthouse CI (Cloudflare preview)
    needs: [deploy, validate]
    if: needs.deploy.result == 'success' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Resolve deployment URL
        # The 'env' context is not in the allowed list for jobs.<job_id>.env:
        # (GitHub Actions restricts it there; actionlint enforces this rule).
        # Using run: to resolve the URL and export it via GITHUB_ENV is the correct pattern.
        run: |
          URL="${{ needs.deploy.outputs.deployment_url }}"
          if [ -z "$URL" ]; then
            URL="${{ env.DEFAULT_PREVIEW_URL }}"
          fi
          echo "DEPLOY_URL=$URL" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create Puppeteer cache directory
        run: mkdir -p /home/runner/.cache/puppeteer

      - name: Restore Puppeteer / Chrome cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Prepare Lighthouse config (URL réelle Cloudflare)
        working-directory: frontend
        env:
          LHCI_URL: ${{ env.DEPLOY_URL }}
        run: node scripts/prepare-lighthouse-config.mjs

      - name: Run Lighthouse CI
        working-directory: frontend
        run: npx @lhci/cli@0.15.1 autorun --config=/tmp/lhcirc.json

      - name: Write Lighthouse scores Cloudflare (référence baseline URL réelle)
        if: always()
        working-directory: frontend
        run: node scripts/lighthouse-guard.mjs --write

      - name: Print Lighthouse summary
        if: always()
        working-directory: frontend
        run: node scripts/lighthouse-summary.mjs

      - name: Ensure Lighthouse artifact files exist
        if: always()
        working-directory: frontend
        run: |
          mkdir -p .lighthouseci
          if [ ! -f .lighthouseci/infra-metadata.json ]; then
            cat > .lighthouseci/infra-metadata.json <<'JSON'
          {
            "status": "placeholder",
            "generatedBy": "deploy-cloudflare-pages.yml safety step"
          }
          JSON
          fi

      - name: Upload Lighthouse reports (JSON + HTML)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-cloudflare-reports
          path: frontend/.lighthouseci/**
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Lighthouse scores Cloudflare (référence baseline URL réelle, 90 jours)
        # Artifact distinct de "lighthouse-scores" (ci.yml, localhost) pour séparer les baselines :
        #   - lighthouse-scores           : scores depuis localhost (ci.yml, comparaison PR)
        #   - lighthouse-scores-cloudflare: scores depuis CDN Cloudflare (qualité réelle)
        # Permet un suivi indépendant par environnement.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-scores-cloudflare
          path: frontend/.lighthouseci/lighthouse-scores.json
          retention-days: 90
          if-no-files-found: warn
