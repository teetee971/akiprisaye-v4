name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, "work", "feat/**", "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DEFAULT_PREVIEW_URL: https://akiprisaye-web.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment_url: ${{ steps.deployment.outputs.url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate Firebase API key secret (fail-fast before build)
        run: |
          WRONG_PART_A="AIzaSyDf_mB8z"
          WRONG_PART_B="MWHFwoFhVLyThuKWMTmhB7uSZY"
          WRONG_KEY="${WRONG_PART_A}${WRONG_PART_B}"
          KEY="${VITE_FIREBASE_API_KEY:-}"
          if [ "$KEY" = "$WRONG_KEY" ]; then
            echo "❌ VITE_FIREBASE_API_KEY secret contient l'ancienne mauvaise clé Firebase."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "ℹ️ VITE_FIREBASE_API_KEY absent — fallback local utilisé."
          else
            echo "✅ VITE_FIREBASE_API_KEY présent et valide."
          fi
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Remove dist/404.html for Cloudflare Pages
        # Vite copies public/404.html (GitHub Pages SPA redirect script) into
        # dist/404.html during the build. Cloudflare Pages serves that file
        # (with a 404 status) for every unmatched route such as /scanner,
        # /alertes, /connexion — which prevents the _redirects `/* /index.html 200`
        # SPA catch-all from ever running. Removing dist/404.html lets Cloudflare
        # fall through to _redirects and return HTTP 200 for these SPA routes.
        # The postbuild script (setup-github-pages-spa.mjs) also does this, but
        # this step serves as an explicit, visible safety net.
        run: rm -f dist/404.html

      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: akiprisaye-web
          directory: frontend/dist

  validate:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve site URL
        id: resolve_site_url
        run: |
          # Always use the deployment URL produced by the deploy job.
          # For PR preview deployments that are protected by Cloudflare Access the
          # validate script handles this gracefully (isCloudflareAccessPage → skipped
          # with a warning rather than a hard failure).  Falling back to the static
          # production alias would incorrectly test a stale deployment instead of the
          # code under review.
          SITE_URL="${{ needs.deploy.outputs.deployment_url }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="${{ env.DEFAULT_PREVIEW_URL }}"
          fi
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validation round 1/3
        run: node scripts/validate-deployment.mjs "${{ steps.resolve_site_url.outputs.site_url }}"

      - name: Wait before round 2
        run: |
          echo "⏳ Waiting before round 2..."
          sleep 15

      - name: Validation round 2/3
        run: node scripts/validate-deployment.mjs "${{ steps.resolve_site_url.outputs.site_url }}"

      - name: Wait before round 3
        run: |
          echo "⏳ Waiting before round 3..."
          sleep 15

      - name: Validation round 3/3
        run: node scripts/validate-deployment.mjs "${{ steps.resolve_site_url.outputs.site_url }}"

      - name: Final proof — 3/3 validations passed ✅
        run: |
          echo "🏆 PREUVE FINALE — DÉPLOIEMENT 100% VALIDÉ"
          echo "✅ Round 1/3 : RÉUSSI"
          echo "✅ Round 2/3 : RÉUSSI"
          echo "✅ Round 3/3 : RÉUSSI"
          echo "🚀 Statut : 100% VERT"

  lighthouse:
    needs: [deploy, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      pull-requests: write
    env:
      DEPLOY_URL: ${{ needs.deploy.outputs.deployment_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Resolve lighthouse target URL
        run: |
          LHCI_TARGET="${{ needs.deploy.outputs.deployment_url }}"
          if [ -z "$LHCI_TARGET" ]; then
            LHCI_TARGET="${{ env.DEFAULT_PREVIEW_URL }}"
          fi
          echo "LHCI_URL=$LHCI_TARGET" >> "$GITHUB_ENV"

      - name: Prepare lighthouse target URL
        run: node scripts/prepare-lighthouse-config.mjs

      - name: Run Lighthouse CI
        run: npm exec lhci autorun --config=../lighthouserc.json

      - name: Write lighthouse scores baseline
        run: node scripts/lighthouse-guard.mjs --write

      - name: Lighthouse summary
        run: node scripts/lighthouse-summary.mjs

      - name: Upload lighthouse reports
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-cloudflare-reports
          path: frontend/.lighthouseci/**
          if-no-files-found: warn

      - name: Upload lighthouse scores baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-scores-cloudflare
          path: frontend/.lighthouseci/lighthouse-scores.json
          retention-days: 90
          if-no-files-found: warn

  audit-head:
    needs: [deploy, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Resolve audit target URL
        id: resolve_url
        run: |
          AUDIT_TARGET="${{ needs.deploy.outputs.deployment_url }}"
          if [ -z "$AUDIT_TARGET" ]; then
            AUDIT_TARGET="${{ env.DEFAULT_PREVIEW_URL }}"
          fi
          echo "audit_url=$AUDIT_TARGET" >> "$GITHUB_OUTPUT"

      - name: Run audit:head
        working-directory: frontend
        run: node scripts/audit-head.mjs "${{ steps.resolve_url.outputs.audit_url }}"
        continue-on-error: true

      - name: Upload audit-head report
        uses: actions/upload-artifact@v7
        with:
          name: audit-head-report
          path: frontend/audit-head-report.json
          if-no-files-found: ignore
          retention-days: 30
