name: "✨ Attribuer un rôle utilisateur"

# Déclenchement manuel depuis l'onglet Actions de GitHub (fonctionne sur mobile).
#
# PRÉREQUIS — ajouter un secret GitHub avant de lancer ce workflow :
#   Dépôt → Settings → Secrets and variables → Actions → New repository secret
#   Nom   : FIREBASE_SERVICE_ACCOUNT
#   Valeur: contenu JSON brut du fichier serviceAccountKey.json téléchargé depuis
#           https://console.firebase.google.com/project/a-ki-pri-sa-ye/settings/serviceaccounts/adminsdk
#
on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email du compte Firebase à modifier (ex: teetee971@gmail.com)"
        required: true
        type: string
      role:
        description: "Rôle à attribuer"
        required: true
        type: choice
        default: creator
        options:
          - creator
          - admin

permissions:
  contents: read

jobs:
  set-user-role:
    name: Attribuer le rôle ${{ github.event.inputs.role }}
    runs-on: ubuntu-latest

    steps:
      - name: Valider les entrées
        env:
          ROLE: ${{ github.event.inputs.role }}
          EMAIL: ${{ github.event.inputs.email }}
        run: |
          if [[ "$ROLE" != "creator" && "$ROLE" != "admin" ]]; then
            echo "❌ Rôle invalide : $ROLE (valeurs acceptées : creator, admin)"
            exit 1
          fi
          if [[ -z "$EMAIL" || "$EMAIL" != *"@"* ]]; then
            echo "❌ Email invalide : $EMAIL"
            exit 1
          fi
          echo "✅ Paramètres validés : role=$ROLE"

      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Installer les dépendances
        run: npm install

      - name: Attribuer le rôle dans Firebase (Custom Claims + Firestore)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TARGET_EMAIL: ${{ github.event.inputs.email }}
          TARGET_ROLE: ${{ github.event.inputs.role }}
        run: node scripts/set-user-role.mjs "$TARGET_EMAIL" "$TARGET_ROLE"
