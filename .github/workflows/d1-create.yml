name: Create D1 Database

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-d1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: price-api

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: price-api/package-lock.json

      - run: npm ci

      - name: Valider les credentials Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ERRORS=0

          # ── Vérification CLOUDFLARE_API_TOKEN ────────────────────────────────
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "❌ Le secret CLOUDFLARE_API_TOKEN est absent ou vide."
            echo "   → Créez un jeton sur : https://dash.cloudflare.com/profile/api-tokens"
            echo "   → Permissions requises :"
            echo "        Compte | Workers D1         | Modifier"
            echo "        Compte | Scripts Workers    | Modifier"
            echo "        Compte | Cloudflare Pages   | Modifier"
            echo "   → Ajoutez-le dans : Settings › Secrets and variables › Actions"
            echo "      Nom du secret : CLOUDFLARE_API_TOKEN"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ CLOUDFLARE_API_TOKEN présent"
          fi

          # ── Vérification CLOUDFLARE_ACCOUNT_ID ──────────────────────────────
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "❌ Le secret CLOUDFLARE_ACCOUNT_ID est absent ou vide."
            echo "   → Comment trouver votre Account ID :"
            echo "      1. Ouvrez https://dash.cloudflare.com"
            echo "      2. Copiez l'identifiant dans l'URL :"
            echo "         dash.cloudflare.com/<ACCOUNT_ID>/home/overview"
            echo "      3. C'est une chaîne de 32 caractères hexadécimaux"
            echo "         Exemple : a1b2c3d4e5f6789012345678901234ab"
            echo "   → Mettez à jour le secret CLOUDFLARE_ACCOUNT_ID dans :"
            echo "      Settings › Secrets and variables › Actions"
            ERRORS=$((ERRORS + 1))
          elif ! echo "${CLOUDFLARE_ACCOUNT_ID}" | grep -qE '^[0-9a-fA-F]{32}$'; then
            LEN=$(echo -n "${CLOUDFLARE_ACCOUNT_ID}" | wc -c)
            echo "❌ CLOUDFLARE_ACCOUNT_ID est invalide (longueur actuelle : ${LEN} caractères)."
            echo "   → Un Account ID Cloudflare doit être EXACTEMENT 32 caractères hexadécimaux."
            echo "   → Comment trouver votre Account ID :"
            echo "      1. Ouvrez https://dash.cloudflare.com"
            echo "      2. Copiez l'identifiant dans l'URL :"
            echo "         dash.cloudflare.com/<ACCOUNT_ID>/home/overview"
            echo "      3. Exemple valide : a1b2c3d4e5f6789012345678901234ab"
            echo "   → Mettez à jour le secret CLOUDFLARE_ACCOUNT_ID dans :"
            echo "      Settings › Secrets and variables › Actions"
            echo "   📄 Guide complet : CLOUDFLARE_SETUP.md à la racine du dépôt"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID présent et format valide (32 hex chars)"
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS erreur(s) de configuration — corrigez les secrets et relancez le workflow."
            exit 1
          fi

      - name: Create D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          output=$(npx wrangler d1 create price-db 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ] && echo "$output" | grep -qi "already exists"; then
            echo "ℹ️  La base de données 'price-db' existe déjà — aucune action requise."
            exit 0
          fi
          exit $exit_code
