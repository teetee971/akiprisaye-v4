name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  backend:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    # Prisma schema uses env("DATABASE_URL"). A valid-format URL is required for
    # `prisma format`, `prisma validate`, and `prisma generate` even though none
    # of those commands open a real database connection.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_db

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prisma format
        run: npx prisma format

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

      - name: Reject any in backend source
        run: |
          if grep -RIn --include="*.ts" --exclude="*.test.ts" --exclude="*.spec.ts" \
            -E "(:\s*any\b|<any>|as\s+any\b)" \
            src/services/gamification src/services/credits; then
            echo "Forbidden any detected in backend gamification/credits source"
            exit 1
          fi

      - name: Run gamification integrity tests
        run: npm test -- --runInBand pointActionConfig legacyActionMapper
