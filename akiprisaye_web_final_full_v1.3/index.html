  <style>
    /* Réinitialisation et styles de base */
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      color: #ffffff;
      background-color: #0b0d17;
      overflow-x: hidden;
    }

    /* Conteneur du carrousel plein écran */
    .carousel {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* Chaque diapositive occupe tout l'espace disponible et se fond avec opacité */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: slideShow 15s infinite;
    }

    /* Définition des images de fond pour chaque diapositive et leurs délais d'animation */
    .slide:nth-child(1) {
      background-image: url('/assets/84ba022c-9450-4e4f-841b-64d5363aaae1_lg-fae4bd71.webp');
      animation-delay: 0s;
    }
    .slide:nth-child(2) {
      background-image: url('/assets/b3ced496-7272-4600-b46e-c14cf625667e_lg-c7465a04.webp');
      animation-delay: 5s;
    }
    .slide:nth-child(3) {
      background-image: url('/assets/0d3bd9ac-734a-4f7d-b671-6dc715ae9e94_lg-cfd04cd8.webp');
      animation-delay: 10s;
    }

    /* Animation de fondu enchaîné pour les diapositives */
    @keyframes slideShow {
      0% {
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      30% {
        opacity: 1;
      }
      35% {
        opacity: 0;
      }
      100% {
        opacity: 0;
      }
    }

    /* Couche de texte par‑dessus le carrousel */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.55);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.8rem;
      margin: 0 0 1rem 0;
      letter-spacing: 0.05rem;
    }

    p.slogan {
      font-size: 1.5rem;
      margin: 0.5rem 0;
    }

    .btn {
      margin-top: 2rem;
      display: inline-block;
      background-color: #0f62fe;
      color: #ffffff;
      padding: 0.8rem 1.8rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #0353e9;
    }

    /* Ajustements responsifs pour petits écrans */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
      p.slogan {
        font-size: 1.1rem;
      }
    }
  </style>

<body>
  <div class="carousel">
    <!-- Diapositives du carrousel -->
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <!-- Couche de texte par dessus -->
    <div class="overlay">
      <h1>A&nbsp;KI PRI SA YÉ</h1>
      <p class="slogan">Gérez votre budget facilement</p>
      <p class="slogan">Comparez les prix et luttez contre la vie chère</p>
      <a href="#app" class="btn">Découvrir l'application</a>
    </div>
  </div>

  <!-- Enregistrement du Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker
          .register('service-worker.js')
          .catch(function (err) {
            console.error('Échec de l\'enregistrement du service worker :', err);
          });
      });
    }
  </script>
</body>
