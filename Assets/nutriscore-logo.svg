<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <title>Nutri-Score Logo</title>
  <!-- Background -->
  <rect width="200" height="100" rx="10" fill="#f8f8f8"/>
  <rect width="200" height="4" fill="#038141"/>
  
  <!-- Logo section -->
  <text x="100" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">NUTRI-SCORE</text>
  
  <!-- Grade badges -->
  <g id="grades">
    <!-- A -->
    <rect x="10" y="40" width="32" height="45" rx="5" fill="#038141"/>
    <text x="26" y="67" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">A</text>
    
    <!-- B -->
    <rect x="47" y="40" width="32" height="45" rx="5" fill="#85BB2F"/>
    <text x="63" y="67" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">B</text>
    
    <!-- C -->
    <rect x="84" y="40" width="32" height="45" rx="5" fill="#FECB02"/>
    <text x="100" y="67" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">C</text>
    
    <!-- D -->
    <rect x="121" y="40" width="32" height="45" rx="5" fill="#EE8100"/>
    <text x="137" y="67" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">D</text>
    
    <!-- E -->
    <rect x="158" y="40" width="32" height="45" rx="5" fill="#E63E11"/>
    <text x="174" y="67" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">E</text>
  </g>
  
  <!-- Border -->
  <rect width="200" height="100" rx="10" fill="none" stroke="#ddd" stroke-width="2"/>
</svg>
