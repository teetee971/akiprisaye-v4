<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="Simulation de scan de ticket de caisse pour A KI PRI SA YÉ." name="description"/>
<title>Scan Ticket - A KI PRI SA YÉ</title>
<link href="style.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
</head>
<body>

<nav class="nav">
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="modules.html">Modules</a></li>
    <li><a href="scanner.html">Scan Ticket</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<header>
<h1>🧾 Scan Intelligent de Ticket</h1>
<p>Simulation de détection automatique des produits et prix</p>
</header>
<main>
<section>
<form>
<label for="ticket-upload">Téléversez une image de ticket ou code-barres :</label><br/><br/>
<input accept="image/*" id="ticket-upload" type="file"/><br/><br/>
</form>
<p class="margin-top">Résultat :</p>
<div id="result" class="result">
<p><strong>Produit :</strong> Riz Basmati 1kg</p>
<p><strong>Prix détecté :</strong> 3,89 €</p>
<p><strong>Écart métropole :</strong> +42%</p>
<p><strong>Alerte :</strong> Prix au-dessus du seuil moyen</p>
</div>
</section>
<p class="text-center margin-top"><a href="modules.html" class="link">← Retour aux modules</a></p>
</main>
<script>
const input = document.getElementById('ticket-upload');
const resultDiv = document.getElementById('result');

input.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      resultDiv.innerHTML = '<p>Analyse en cours...</p>';
      Quagga.decodeSingle({
        src: event.target.result,
        numOfWorkers: 0,
        inputStream: {
          size: 800
        },
        locator: {
          patchSize: "medium",
          halfSample: true
        },
        decoder: {
          readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "upc_reader"]
        }
      }, function(result) {
        if (result && result.codeResult) {
          resultDiv.innerHTML = '<p><strong>Code-barres détecté :</strong> ' + result.codeResult.code + '</p><p>Produit simulé basé sur le code.</p>';
        } else {
          resultDiv.innerHTML = '<p>Aucun code-barres détecté. Veuillez réessayer avec une image plus claire.</p>';
        }
      });
    };
    reader.readAsDataURL(file);
  }
});
</script>
</body>
</html>
