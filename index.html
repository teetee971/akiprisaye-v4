<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- App -->
    <title>A KI PRI SA YÉ – Transparence des prix Outre-mer</title>
    <meta
      name="description"
      content="Application citoyenne dédiée à la compréhension et à la transparence des prix dans les territoires d’Outre-mer."
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://akiprisaye.pages.dev/" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo-akiprisaye.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Fallback CSS (ANTI BLACK SCREEN) -->
    <style>
      body {
        margin: 0;
        background: #0f172a;
        color: #f1f5f9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }

      .fallback-box {
        max-width: 520px;
      }

      .badge {
        display: inline-block;
        margin-top: 16px;
        padding: 6px 12px;
        border-radius: 999px;
        background: #00a86b;
        color: #000;
        font-weight: 600;
        font-size: 0.85rem;
      }
    </style>
  </head>

  <body>
    <!-- 🔒 Fallback statique TOUJOURS visible -->
    <div class="fallback">
      <div class="fallback-box">
        <h1>🟢 A KI PRI SA YÉ</h1>
        <p>
          Le site est en ligne.<br />
          L’infrastructure fonctionne.<br />
          Le chargement React est progressif et sécurisé.
        </p>
        <div class="badge">Cloudflare Pages OK</div>
      </div>
    </div>

    <!-- ⚛️ Point d’ancrage React (NON bloquant) -->
    <div id="react-root"></div>

    <!-- React loader progressif (sécurisé, non bloquant) -->
    <script src="/react-entry.js"></script>

    <!-- Legacy comparison tracker (optionnel, non bloquant) -->
    <script src="/scripts/comparison-tracker.js" nomodule></script>

    <noscript>
      <div class="fallback">
        <div class="fallback-box">
          <h1>JavaScript requis</h1>
          <p>
            Cette application nécessite JavaScript pour fonctionner.<br />
            Veuillez l’activer dans votre navigateur.
          </p>
        </div>
      </div>
    </noscript>
  </body>
</html>
