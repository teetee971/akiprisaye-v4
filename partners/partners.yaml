# Partners Registry for A KI PRI SA YÉ
# Schema for partner supermarkets/grocery stores in DOM-TOM territories
#
# Fields:
#   key: Unique identifier for the partner (lowercase, alphanumeric with hyphens)
#   name: Display name of the partner
#   territories: Array of territory codes where the partner operates
#     - GP: Guadeloupe
#     - MQ: Martinique
#     - GF: Guyane (French Guiana)
#     - RE: Réunion
#     - YT: Mayotte
#   status: Current status of the partner
#     - pending: Discovered but not yet integrated
#     - active: Fully integrated and operational
#     - disabled: Temporarily or permanently disabled
#   auth: Authentication method for API access
#     - none: No authentication required
#     - apiKey: API key authentication
#     - oauth: OAuth 2.0 authentication
#     - custom: Custom authentication method
#   baseUrl: Base URL for the partner's API (if available)
#   priceEndpoint: Endpoint path for price data (relative to baseUrl)
#   headersTemplate: Template for HTTP headers (JSON format)
#   rateLimitPerMinute: Maximum API requests per minute
#   ttlHours: Time-to-live for cached data in hours

partners: []

