<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page introuvable - A KI PRI SA YÉ</title>

    <style media="screen">
      body { 
        background: #0f172a; 
        color: #f1f5f9; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        padding: 0; 
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #message { 
        background: #1e293b; 
        max-width: 480px; 
        margin: 20px; 
        padding: 48px 32px; 
        border-radius: 12px; 
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }
      #message h1 { 
        font-size: 72px; 
        font-weight: 700; 
        color: #3b82f6; 
        margin: 0 0 16px;
      }
      #message h2 { 
        font-size: 24px; 
        font-weight: 600; 
        color: #f1f5f9; 
        margin: 0 0 16px;
      }
      #message p { 
        line-height: 1.6; 
        margin: 16px 0 32px; 
        font-size: 16px; 
        color: #cbd5e1;
      }
      #message a { 
        display: inline-block; 
        background: #3b82f6; 
        text-transform: uppercase; 
        text-decoration: none; 
        color: white; 
        padding: 14px 32px; 
        border-radius: 8px; 
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
        transition: background 0.2s;
      }
      #message a:hover {
        background: #2563eb;
      }
      .logo {
        font-size: 14px;
        color: #64748b;
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h1>404</h1>
      <h2>Page introuvable</h2>
      <p>La page que vous recherchez n'existe pas ou a été déplacée.</p>
      <a href="/">Retour à l'accueil</a>
      <div class="logo">A KI PRI SA YÉ</div>
    </div>
  </body>
</html>
