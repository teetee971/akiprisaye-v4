<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palmarès - A KI PRI SA YÉ</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="sidebar">
    <ul>
      <li><a href="/">Accueil</a></li>
      <li><a href="/civic-modules">Modules</a></li>
      <li><a href="/scan">Scan Ticket</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>
  <main>
    <h1>🏆 Classement des Enseignes</h1>
    <button id="recalculate">Recalculer le classement</button>
    <table id="ranking-table">
      <tr><th>Enseigne</th><th>Panier Moyen</th><th>Note</th></tr>
      <tr><td>Super U</td><td>49,80 €</td><td>⭐⭐⭐⭐</td></tr>
      <tr><td>Carrefour</td><td>51,90 €</td><td>⭐⭐⭐</td></tr>
      <tr><td>Leader Price</td><td>48,30 €</td><td>⭐⭐⭐⭐⭐</td></tr>
    </table>
  </main>
<script>
document.getElementById('recalculate').addEventListener('click', function() {
  const table = document.getElementById('ranking-table');
  const rows = Array.from(table.rows).slice(1); // skip header
  // Update prices randomly
  rows.forEach(row => {
    const priceCell = row.cells[1];
    const base = parseFloat(priceCell.textContent.replace(',', '.').replace(' €', ''));
    const newPrice = (base + (Math.random() - 0.5) * 2).toFixed(2).replace('.', ',');
    priceCell.textContent = newPrice + ' €';
  });
  // Sort by price ascending
  rows.sort((a, b) => {
    const priceA = parseFloat(a.cells[1].textContent.replace(',', '.').replace(' €', ''));
    const priceB = parseFloat(b.cells[1].textContent.replace(',', '.').replace(' €', ''));
    return priceA - priceB;
  });
  // Reappend rows
  rows.forEach(row => table.appendChild(row));
});
</script>
</body>
</html>
