<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des magasins - A KI PRI SA YÉ</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        body {
            background: #0d0f16;
            color: white;
            margin: 0;
            font-family: Arial;
        }

        #map {
            width: 100%;
            height: 70vh;
            background: #111;
            border-radius: 14px;
            margin-top: 20px;
        }

        .container {
            padding: 20px;
        }

        select {
            width: 100%;
            padding: 14px;
            background: #121626;
            color: white;
            border-radius: 10px;
            border: 1px solid #333;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 style="text-align:center;">magasins</h1>

        <select id="territorySelector">
            <option value="guadeloupe">🇬🇵 Guadeloupe</option>
        </select>

        <div id="map"></div>

        <h3 style="margin-top:25px;">📍 Légende</h3>
        <ul>
            <li>🔵 Magasins partenaires</li>
        </ul>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- Scripts -->
    <script type="module">
        import { TERRITORIES } from "./scripts/territories.js";
        import { initMap } from "./scripts/map-init.js";
        import { loadStoresForTerritory } from "./scripts/load-map.js";

        console.log("Carte — démarrage…");

        // Initialisation de la carte
        const map = initMap();

        const selector = document.getElementById("territorySelector");

        async function refreshStores() {
            const territory = selector.value;
            console.log("Territoire sélectionné :", territory);

            await loadStoresForTerritory(map, territory);
        }

        // Changement de territoire
        selector.addEventListener("change", refreshStores);

        // Chargement initial
        refreshStores();
    </script>

</body>
</html>
