<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A KI PRI SA YÉ – Carte interactive des magasins</title>
  <!-- Feuille de styles de Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIu6VLd9gENbYQaS0pQsLnwLkLkS0Z8pcvY="
    crossorigin=""
  />
  <!-- Style de la page -->
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #060814;
      color: #f4f4f4;
    }
    header {
      background-color: #0e64f5;
      padding: 1rem;
      color: white;
      text-align: center;
    }
    #map-container {
      padding: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    #territorySelect {
      width: 100%;
      padding: 0.5rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    #map {
      width: 100%;
      height: 500px;
      border-radius: 12px;
    }
    .legend {
      background-color: #161c2e;
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem auto;
      max-width: 900px;
      color: #f4f4f4;
    }
    .legend li {
      list-style: none;
      margin-bottom: 0.5rem;
    }
    .legend span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Carte interactive des magasins</h1>
  </header>

  <div id="map-container">
    <select id="territorySelect"></select>
    <div id="map"></div>
  </div>

  <div class="legend">
    <h2>Légende</h2>
    <ul>
      <li>
        <span style="background-color: #1e88e5;"></span> Magasins partenaires
      </li>
    </ul>
  </div>

  <!-- Bibliothèque Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuK2/Z9VM+kNiyxNV1lvTLZBo="
    crossorigin=""
  ></script>

  <!-- Script principal en module -->
  <script type="module">
    import { TERRITORIES } from "./scripts/territories.js";
    import { initMap } from "./scripts/map-init.js";
    import { loadStoresForTerritory } from "./scripts/load-map.js";

    // Récupérer la liste déroulante
    const selectEl = document.getElementById("territorySelect");

    // Remplir la liste avec les territoires définis dans territories.js
    for (const [key, value] of Object.entries(TERRITORIES)) {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = value.label;
      selectEl.appendChild(option);
    }

    let mapInstance = null;

    // Lorsque l'utilisateur change de territoire
    selectEl.addEventListener("change", async (e) => {
      const selectedKey = e.target.value;
      const territory = TERRITORIES[selectedKey];
      if (!territory) return;

      // Initialisation ou changement de vue de la carte
      if (!mapInstance) {
        mapInstance = initMap(territory);
      } else {
        mapInstance.setView([territory.lat, territory.lon], territory.zoom);
      }

      // Charger les magasins pour le territoire sélectionné
      await loadStoresForTerritory(mapInstance, selectedKey);
    });

    // Sélectionner par défaut le premier territoire et initialiser la carte
    const defaultKey = Object.keys(TERRITORIES)[0];
    selectEl.value = defaultKey;
    mapInstance = initMap(TERRITORIES[defaultKey]);
    loadStoresForTerritory(mapInstance, defaultKey);
  </script>
</body>
</html>
