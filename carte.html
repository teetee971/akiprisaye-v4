<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Carte des Magasins • A KI PRI SA YÉ</title>

    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./scripts/load-map.js" defer></script>

    <style>
        #map {
            width: 100%;
            height: 85vh;
            border-radius: 14px;
            overflow: hidden;
            margin-top: 70px;
        }

        .territory-select {
            width: 92%;
            margin: 15px auto;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #111;
            color: #fff;
            font-size: 17px;
        }
    </style>

</head>
<body>

    <!-- NAVBAR AUTO-LOAD -->
    <div id="navbar-container"></div>

    <h2 style="margin-left: 15px;">Carte des magasins</h2>

    <select id="territory" class="territory-select">
        <option value="">Sélectionner un territoire…</option>
        <option value="guadeloupe">Guadeloupe</option>
        <option value="martinique">Martinique</option>
        <option value="guyane">Guyane</option>
        <option value="reunion">La Réunion</option>
        <option value="mayotte">Mayotte</option>
    </select>

    <div id="map"></div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-TA-METTRE-TA-CLE-ICI"></script>

</body>
</html>
