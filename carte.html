<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive des magasins - A KI PRI SA YÉ</title>

    <!-- Style global -->
    <link rel="stylesheet" href="/dist/assets/main.css" onerror="this.href='/dist/assets/main-BXLYN4L9.css'">

    <script type="module">
        // Fonction pour récupérer automatiquement le bon JS généré par Vite
        async function loadCarteScript() {
            try {
                // On récupère la liste des fichiers dans /dist/assets/
                const res = await fetch("/dist/assets/");
                const html = await res.text();

                // On recherche un fichier du type carte-xxxx.js
                const match = html.match(/carte-[a-zA-Z0-9]+\.js/g);

                if (!match) {
                    console.error("❌ Fichier carte-*.js introuvable.");
                    return;
                }

                const scriptName = match[0];
                console.log("📌 Chargement du script :", scriptName);

                // Import dynamique du bon fichier
                await import(`/dist/assets/${scriptName}`);

            } catch (e) {
                console.error("Erreur lors du chargement dynamique :", e);
            }
        }

        loadCarteScript();
    </script>

    <style>
        body {
            background: #0d0f16;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        .panel {
            background: rgba(255,255,255,0.04);
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .map-zone {
            width: 100%;
            height: 70vh;
            background: #0a0c12;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }
        select {
            width: 100%;
            background: #1a1d29;
            border: 1px solid #2c3142;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            color: #4d9cff;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1 class="title">🗺️ Carte interactive des magasins</h1>

        <div class="panel">
            <select id="territoire-select">
                <option value="guadeloupe">🇬🇵 Guadeloupe</option>
                <option value="martinique">🇲🇶 Martinique</option>
                <option value="guyane">🇬🇫 Guyane</option>
                <option value="reunion">🇷🇪 La Réunion</option>
                <option value="mayotte">🇾🇹 Mayotte</option>
                <option value="saint-martin">🇫🇷 Saint-Martin</option>
                <option value="saint-barthelemy">🇫🇷 Saint-Barthélemy</option>
                <option value="saint-pierre-miquelon">🇫🇷 Saint-Pierre-et-Miquelon</option>
                <option value="wallis-futuna">🇼🇫 Wallis-et-Futuna</option>
                <option value="polynesie">🇵🇫 Polynésie française</option>
                <option value="nouvelle-caledonie">🇳🇨 Nouvelle-Calédonie</option>
            </select>
        </div>

        <div class="map-zone" id="map"></div>

        <div class="panel">
            <h2 style="color:#4d9cff">📍 Légende</h2>
            <p>🔵 Magasins partenaires</p>
            <p>💡 Cliquez sur un marqueur pour voir les informations du magasin</p>
        </div>

    </div>
</body>
</html>
