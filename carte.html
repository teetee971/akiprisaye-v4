<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des magasins - A KI PRI SA YÉ</title>
  <meta name="description" content="Carte interactive des magasins et enseignes dans les territoires d'Outre-mer. Localisez les points de vente près de chez vous.">
  <meta http-equiv="refresh" content="0; url=/#/carte">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .redirect-message {
      max-width: 500px;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="redirect-message">
    <h1>🗺️ Carte Interactive</h1>
    <div class="spinner"></div>
    <p>Redirection vers la version moderne...</p>
    <p><a href="/#/carte" style="color: white; text-decoration: underline;">Cliquez ici si la redirection ne fonctionne pas</a></p>
  </div>
  <script>
    // Redirect immediately
    window.location.href = '/#/carte';
  </script>
</body>
</html>
