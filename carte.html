<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A KI PRI SA YÉ — Carte interactive</title>

    <!-- Leaflet core -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIu6VLd9gENbYQaS0pQsLnwLkLkS0Z8pcvY="
        crossorigin=""
    />

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1vTlZBo="
        crossorigin=""
    ></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        #map {
            height: 70vh;
            width: 100%;
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
        }

        .legend {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            font-size: 16px;
            border: 1px solid #334155;
        }

        .legend-title {
            font-weight: bold;
            color: #3b82f6;
            margin-bottom: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-top: 6px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3b82f6;
            display: inline-block;
            margin-right: 8px;
        }

        .header {
            background: #1d4ed8;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div class="header">A KI PRI SA YÉ</div>

    <div id="map"></div>

    <div class="legend">
        <div class="legend-title">📍 Légende</div>

        <div class="legend-item">
            <span class="legend-color"></span> Magasins partenaires
        </div>

        <div class="legend-item">
            💡 Cliquez sur un marqueur pour voir les informations du magasin
        </div>
    </div>

    <!-- Initialisation -->
    <script type="module">
        import { loadMap } from "./scripts/load-map.js";
        loadMap();
    </script>

</body>
</html>
