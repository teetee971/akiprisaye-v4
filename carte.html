<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Carte des magasins – A KI PRI SA YÉ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #f9fafb;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.4);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: radial-gradient(circle at top left, #0f172a, #020617 60%);
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      label {
        font-size: 0.9rem;
        color: #e5e7eb;
      }

      select {
        background: #020617;
        color: #e5e7eb;
        border: 1px solid rgba(148, 163, 184, 0.7);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.9rem;
      }

      #map {
        width: 100%;
        height: calc(100vh - 64px);
      }

      .leaflet-popup-content {
        font-size: 0.85rem;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Carte des magasins</h1>

      <div class="controls">
        <label for="territory-select">Territoire :</label>
        <select id="territory-select">
          <option value="Guadeloupe">Guadeloupe</option>
          <option value="Martinique">Martinique</option>
          <option value="Guyane">Guyane</option>
          <option value="Réunion">Réunion</option>
          <option value="Mayotte">Mayotte</option>
          <option value="Métropole">Métropole</option>
        </select>
      </div>
    </header>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Initialisation de la carte -->
    <script type="module">
      import { loadMap } from "./scripts/load-map.js";

      // Lance immédiatement la carte (territoire par défaut = Guadeloupe)
      loadMap();
    </script>
  </body>
</html>
