<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des magasins - A KI PRI SA YÉ</title>

    <!-- Leaflet (carte) -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    ></script>

    <style>
        body {
            margin: 0;
            background: #0d0f17;
            color: white;
            font-family: Arial, sans-serif;
        }

        #territory-select {
            width: 90%;
            margin: 20px auto;
            padding: 15px;
            background: #1a1d2e;
            border-radius: 10px;
            border: 1px solid #3d4a73;
            color: white;
            font-size: 18px;
        }

        #map {
            width: 95%;
            height: 500px;
            margin: auto;
            border-radius: 15px;
            border: 1px solid #3b3b3b;
        }

        .legend {
            width: 90%;
            margin: 20px auto;
            background: #161923;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #2b2f42;
        }

        .legend-title {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;margin-top:20px;">🛒 Magasins</h2>

    <!-- Sélecteur Territoire -->
    <select id="territory-select"></select>

    <!-- Carte -->
    <div id="map"></div>

    <!-- Légende -->
    <div class="legend">
        <div class="legend-title">📍 Légende</div>
        <p>🔵 Magasins partenaires</p>
    </div>

    <!-- Scripts -->
    <script type="module">

        import { TERRITORIES } from "./scripts/territories.js";
        import { initMap } from "./scripts/map-init.js";
        import { loadStoresForTerritory } from "./scripts/load-map.js";

        console.log("Carte — démarrage…");

        // Remplit le sélecteur de territoire
        const select = document.getElementById("territory-select");

        for (let key in TERRITORIES) {
            const t = TERRITORIES[key];
            const option = document.createElement("option");

            option.value = t.code;
            option.textContent = t.name;

            select.appendChild(option);
        }

        // Initialise carte
        let currentTerritory = "guadeloupe";
        let map = initMap("map");

        // Charge les magasins de base
        loadStoresForTerritory(currentTerritory, map);

        // Changement territoire
        select.addEventListener("change", async (e) => {
            currentTerritory = e.target.value;

            console.log("🔄 Changement territoire :", currentTerritory);

            map = initMap("map");
            loadStoresForTerritory(currentTerritory, map);
        });

    </script>
</body>
</html>
