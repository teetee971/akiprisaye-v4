  <main>
    <h1>🗺️ Carte interactive des magasins</h1>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([16.265, -61.551], 10); // Guadeloupe par défaut

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const magasins = [
      { name: "Carrefour Destreland", lat: 16.2676, lon: -61.5252 },
      { name: "E.Leclerc Abymes", lat: 16.2731, lon: -61.5062 },
      { name: "Leader Price Baie-Mahault", lat: 16.2679, lon: -61.5863 }
    ];

    magasins.forEach(m => {
      L.marker([m.lat, m.lon]).addTo(map)
        .bindPopup('<strong>' + m.name + '</strong>');
    });
  </script>
