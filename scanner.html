<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de produit - A KI PRI SA YÉ</title>
  <meta http-equiv="refresh" content="0; url=/#/scan-ean">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .redirect-message {
      max-width: 500px;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="redirect-message">
    <h1>📷 Scanner Code-Barres</h1>
    <div class="spinner"></div>
    <p>Redirection vers le scanner moderne...</p>
    <p><a href="/#/scan-ean" style="color: white; text-decoration: underline;">Cliquez ici si la redirection ne fonctionne pas</a></p>
  </div>
  <script>
    // Redirect immediately
    window.location.href = '/#/scan-ean';
  </script>
</body>
</html>
