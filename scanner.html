<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scanner de codes-barres – Comparez instantanément le prix d’un produit en Outre-mer.">
    <title>Scanner – A KI PRI SA YÉ</title>

    <link rel="stylesheet" href="styles/style.css">

    <!-- ZXing pour scan caméra -->
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

    <!-- HEADER GLOBAL -->
    <header id="app-header"></header>

    <section class="page-title">
        <h1>📸 Scanner un produit</h1>
        <p class="subtitle">Scanne le code-barres pour obtenir immédiatement le meilleur prix.</p>
    </section>

    <section class="scanner-section">

        <!-- Aperçu caméra -->
        <div class="camera-container">
            <video id="video" autoplay></video>
            <div id="camera-loader" class="loader">Ouverture de la caméra…</div>
        </div>

        <!-- Résultat -->
        <div id="scanResult" class="scan-result">
            Aucun scan pour le moment…
        </div>

        <!-- Fallback input si la caméra ne marche pas -->
        <div class="fallback">
            <input id="manualCode" type="text" placeholder="Saisir un code-barres manuellement">
            <button id="manualBtn" class="btn btn-primary">Rechercher</button>
        </div>

    </section>

    <!-- FOOTER GLOBAL -->
    <footer id="app-footer"></footer>

    <!-- Scripts -->
    <script src="scripts/scanner.js"></script>
    <script src="scripts/comparateur-data.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

</body>
</html>
