    .account-section h2 {
      color: #0f62fe;
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #b8b8b8;
      font-weight: 500;
    }
    
    input, select {
      width: 100%;
      padding: 0.75rem;
      background: #0b0d17;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      color: #ffffff;
      font-family: inherit;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #0f62fe;
    }
    
    .btn-primary {
      width: 100%;
      padding: 1rem;
      min-height: 48px;
      background: linear-gradient(135deg, #0f62fe, #0353e9);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      touch-action: manipulation;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(15, 98, 254, 0.4);
    }
    
    .login-prompt {
      text-align: center;
      padding: 3rem;
      color: #b8b8b8;
    }

    <div class="shared-header-content">
      <div style="display: flex; align-items: center; gap: 1rem;">

  <main>
    <h1>👤 Mon Compte</h1>
    
    <div class="account-section">
      <h2>Informations personnelles</h2>
      <form>
        <div class="form-group">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" placeholder="Votre nom">
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="votre@email.com">
        </div>
        
        <div class="form-group">
          <label for="territory">Territoire</label>
          <select id="territory" name="territory">
            <option value="">Sélectionnez votre territoire</option>
            <optgroup label="DROM (Départements et Régions d'Outre-Mer)">
              <option value="guadeloupe">🇬🇵 Guadeloupe</option>
              <option value="martinique">🇲🇶 Martinique</option>
              <option value="guyane">🇬🇫 Guyane</option>
              <option value="reunion">🇷🇪 La Réunion</option>
              <option value="mayotte">🇾🇹 Mayotte</option>
            </optgroup>
            <optgroup label="COM (Collectivités d'Outre-Mer)">
              <option value="polynesie">🇵🇫 Polynésie française</option>
              <option value="nouvellecaledonie">🇳🇨 Nouvelle-Calédonie</option>
              <option value="wallisetfutuna">🇼🇫 Wallis-et-Futuna</option>
              <option value="saintmartin">🇲🇫 Saint-Martin</option>
              <option value="saintbarthelemy">🇧🇱 Saint-Barthélemy</option>
              <option value="saintpierreetmiquelon">🇵🇲 Saint-Pierre-et-Miquelon</option>
            </optgroup>
            <optgroup label="Autres territoires">
              <option value="taaf">🇹🇫 Terres australes et antarctiques françaises (TAAF)</option>
            </optgroup>
          </select>
        </div>
        
        <button type="submit" class="btn-primary">Enregistrer les modifications</button>
      </form>
    </div>
    
    <div class="account-section">
      <h2>Préférences</h2>
      <div class="form-group">
        <label for="notifications">
          <input type="checkbox" id="notifications" name="notifications" style="width: auto; margin-right: 0.5rem;">
          Recevoir les notifications de prix
        </label>
      </div>
      <div class="form-group">
        <label for="newsletter">
          <input type="checkbox" id="newsletter" name="newsletter" style="width: auto; margin-right: 0.5rem;">
          Recevoir la newsletter
        </label>
      </div>
    </div>
  </main>
